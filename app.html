<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>출석 체크</title>

<style>
body {
  font-family: sans-serif;
  background:#c1e5d2;
  padding:20px;
  font-size:20px;
}

h1 { text-align:center; }

.top {
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

input {
  flex:1;
  padding:14px;
  font-size:20px;
}

button {
  padding:14px;
  border:none;
  border-radius:10px;
  background:#2e7d32;
  color:white;
  font-size:20px;
}

.student {
  background:white;
  padding:18px;
  margin-bottom:10px;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition:0.2s;
}

.student:active {
  transform:scale(0.97);
}

.delete { background:red; }

.calendarModal {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.calendarBox {
  background:white;
  padding:20px;
  border-radius:15px;
  width:90%;
  max-width:500px;
}

.calendarHeader {
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.calendar {
  display:grid;
  grid-template-columns: repeat(7,1fr);
  gap:8px;
}

.day {
  padding:12px;
  background:#eee;
  text-align:center;
  border-radius:8px;
}

/* 출석 표시 */
.active {
  background:#4caf50;
  color:white;
}

/* 오늘 */
.today {
  border:3px solid #5f9578;
}

/* 주말 */
.sunday {
  color:#e881c6;
  font-weight:bold;
}

.saturday {
  color:#82d3e8;
  font-weight:bold;
}

</style>
</head>

<body>

<h1>출석 체크</h1>

<div class="top">
  <input id="search" placeholder="이름 검색" oninput="render()">
</div>

<div class="top">
  <input id="nameInput" placeholder="학생 이름">
  <button onclick="addStudent()">추가</button>
</div>

<div id="list"></div>

<!-- 달력 -->
<div class="calendarModal" id="calendarModal" onclick="closeCalendar(event)">
  <div class="calendarBox">
    <div class="calendarHeader">
      <button onclick="prevMonth()">◀</button>
      <div id="monthTitle"></div>
      <button onclick="nextMonth()">▶</button>
    </div>
    <div class="calendar" id="calendar"></div>
  </div>
</div>

<script>
let students = JSON.parse(localStorage.getItem("students")) || [];
let history = JSON.parse(localStorage.getItem("history")) || {};
let selectedStudent = null;
let currentDate = new Date();

// 🔊 소리
const sound = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");

function save() {
  localStorage.setItem("students", JSON.stringify(students));
  localStorage.setItem("history", JSON.stringify(history));
}

function today() {
  return new Date().toISOString().split("T")[0];
}

function nowTime() {
  return new Date().toLocaleTimeString();
}

function addStudent() {
  const name = document.getElementById("nameInput").value.trim();
  if (!name) return;
  students.push({ name, count: 10 });
  save();
  render();
}

function attend(i) {
  const name = students[i].name;
  const date = today();

  if (!history[date]) history[date] = [];
  history[date].push({ name, time: nowTime() });

  sound.currentTime = 0;
  sound.play();

  save();
  render();
}

function deleteStudent(i) {
  if (!confirm("삭제?")) return;
  students.splice(i,1);
  save();
  render();
}

function filteredStudents() {
  const q = document.getElementById("search").value.toLowerCase();
  return students.filter(s => s.name.toLowerCase().includes(q));
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  filteredStudents().forEach((s,i)=>{
    const realIndex = students.indexOf(s);

    const div = document.createElement("div");
    div.className = "student";

    div.innerHTML = `
      <div onclick="openCalendar('${s.name}')">
        ${s.name}
      </div>
      <div>
        <button onclick="attend(${realIndex})">출석</button>
        <button class="delete" onclick="deleteStudent(${realIndex})">삭제</button>
      </div>
    `;

    list.appendChild(div);
  });
}

/* 📅 달력 */
function openCalendar(name) {
  selectedStudent = name;
  document.getElementById("calendarModal").style.display = "flex";
  drawCalendar();
}

function closeCalendar(e) {
  if (e.target.id === "calendarModal") {
    document.getElementById("calendarModal").style.display = "none";
  }
}

function drawCalendar() {
  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();

  document.getElementById("monthTitle").innerText =
    year + "년 " + (month+1) + "월";

  const firstDay = new Date(year, month, 1).getDay();
  const lastDay = new Date(year, month+1, 0).getDate();
  const todayStr = today();

  const days = ["일","월","화","수","목","금","토"];
  days.forEach((d,i)=>{
    const div = document.createElement("div");
    div.className = "day";
    div.innerText = d;

    if (i===0) div.classList.add("sunday");
    if (i===6) div.classList.add("saturday");

    cal.appendChild(div);
  });

  for (let i=0;i<firstDay;i++) {
    cal.appendChild(document.createElement("div"));
  }

  for (let i=1;i<=lastDay;i++) {
    const date = year + "-" + String(month+1).padStart(2,"0") + "-" + String(i).padStart(2,"0");

    const div = document.createElement("div");
    div.className = "day";
    div.innerText = i;

    const dayOfWeek = new Date(year, month, i).getDay();

    if (dayOfWeek === 0) div.classList.add("sunday");
    if (dayOfWeek === 6) div.classList.add("saturday");

    if (date === todayStr) div.classList.add("today");

    if (history[date]) {
      history[date].forEach(r=>{
        if (r.name === selectedStudent) div.classList.add("active");
      });
    }

    cal.appendChild(div);
  }
}

function prevMonth() {
  currentDate.setMonth(currentDate.getMonth()-1);
  drawCalendar();
}

function nextMonth() {
  currentDate.setMonth(currentDate.getMonth()+1);
  drawCalendar();
}

render();
</script>

</body>
</html>
