<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>출석 체크</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background: linear-gradient(135deg, #eef2f7, #dfe9f3);
}

.header {
  text-align:center;
  padding:20px;
}

.top {
  display:flex;
  gap:10px;
  padding:10px;
}

input {
  flex:1;
  padding:10px;
  border-radius:8px;
  border:none;
}

.student {
  background:white;
  margin:10px;
  padding:15px;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button {
  background:#4CAF50;
  color:white;
  border:none;
  padding:10px;
  border-radius:8px;
}

.delete {
  background:red;
}

.admin {
  position:fixed;
  bottom:10px;
  right:10px;
  background:#333;
  font-size:12px;
}
</style>
</head>

<body>

<div class="header">
  <h2>출석 체크</h2>
</div>

<div class="top">
  <input id="search" placeholder="이름 검색" oninput="render()">
</div>

<div class="top" id="adminPanel" style="display:none;">
  <input id="nameInput" placeholder="학생 이름">
  <button onclick="addStudent()">추가</button>
</div>

<div id="list"></div>

<button class="admin" onclick="toggleAdmin()">관리자</button>

<!-- 🔊 소리 -->
<audio id="sound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b8b6f.mp3"></audio>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAOAYSvUXY5PNDfAgxBq0OVKAbkY0Tp7IM",
  authDomain: "student-attendence-e9f58.firebaseapp.com",
  databaseURL: "https://student-attendence-e9f58-default-rtdb.firebaseio.com",
  projectId: "student-attendence-e9f58"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let students = [];
let history = {};
let isAdmin = false;

db.ref("data").on("value", snap => {
  const val = snap.val() || {};
  students = val.students || [];
  history = val.history || {};
  render();
});

function save() {
  db.ref("data").set({ students, history });
}

function today() {
  return new Date().toISOString().split("T")[0];
}

function nowTime() {
  return new Date().toLocaleTimeString();
}

function toggleAdmin() {
  const pw = prompt("비밀번호");
  if (pw === "1234") {
    isAdmin = !isAdmin;
    document.getElementById("adminPanel").style.display = isAdmin ? "flex" : "none";
    render();
  }
}

function addStudent() {
  const name = document.getElementById("nameInput").value.trim();
  if (!name) return;
  students.push({ name, count: 10 });
  save();
}

function deleteStudent(i) {
  if (!confirm("삭제?")) return;
  students.splice(i,1);
  save();
}

function attend(i) {
  if (students[i].count <= 0) return;

  // 🔊 소리
  const sound = document.getElementById("sound");
  sound.currentTime = 0;
  sound.play();

  const name = students[i].name;
  const date = today();

  if (!history[date]) history[date] = [];
  history[date].push({ name, time: nowTime() });

  students[i].count--;
  save();
}

function filtered() {
  const q = document.getElementById("search").value.toLowerCase();
  return students.filter(s => s.name.toLowerCase().includes(q));
}

function showLogs(name) {
  if (!isAdmin) return;

  let msg = name + "\\n\\n";

  Object.keys(history).forEach(date => {
    history[date].forEach(r => {
      if (r.name === name) {
        msg += date + " " + r.time + "\\n";
      }
    });
  });

  let action = prompt(msg + "\\n1: 날짜삭제 / 2: 횟수수정");

  if (action === "1") {
    let d = prompt("날짜 입력");
    if (history[d]) {
      history[d] = history[d].filter(r => r.name !== name);
      let s = students.find(x=>x.name===name);
      if (s) s.count++;
      save();
    }
  }

  if (action === "2") {
    let s = students.find(x=>x.name===name);
    let v = prompt("새 횟수", s.count);
    if (v!==null) {
      s.count = Number(v);
      save();
    }
  }
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  filtered().forEach((s,i)=>{
    const realIndex = students.indexOf(s);

    const div = document.createElement("div");
    div.className = "student";

    div.innerHTML = `
      <div onclick="showLogs('${s.name}')">
        ${s.name} (${s.count})
      </div>
      <div>
        <button onclick="attend(${realIndex})">출석</button>
        ${isAdmin ? `<button class="delete" onclick="deleteStudent(${realIndex})">삭제</button>` : ""}
      </div>
    `;

    list.appendChild(div);
  });
}

// 초기 데이터
setTimeout(()=>{
  if (students.length === 0) {
    students = [
      {name:"학생1", count:10},
      {name:"학생2", count:10}
    ];
    save();
  }
}, 1000);
</script>

</body>
</html>
