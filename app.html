<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>출석 체크</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#c1e5d2;
  font-size:20px;
}

.header {
  text-align:center;
  padding:20px;
}

.top {
  display:flex;
  gap:10px;
  padding:10px;
}

input {
  flex:1;
  padding:16px;
  font-size:18px;
  border-radius:10px;
  border:none;
}

.student {
  background:white;
  margin:20px;
  padding:25px;
  border-radius:16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition: transform 0.1s;
}

button {
  background:#4CAF50;
  color:white;
  border:none;
  padding:16px;
  font-size:18px;
  border-radius:12px;
}

.delete { background:red; }

.admin {
  position:fixed;
  bottom:10px;
  right:10px;
  background:#333;
  font-size:12px;
}

/* 🔥 클릭 애니메이션 */
.click {
  transform: scale(0.95);
}

/* ✨ 팡 효과 */
.pop {
  position:fixed;
  font-size:30px;
  animation: pop 0.6s ease-out forwards;
}

@keyframes pop {
  0% { transform: scale(0.5); opacity:1; }
  100% { transform: scale(1.5); opacity:0; }
}

/* 📅 달력 */
.calendar {
  display:grid;
  grid-template-columns: repeat(7,1fr);
  gap:8px;
  padding:10px;
}

.day {
  background:white;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

.active {
  background:#4CAF50;
  color:white;
}
</style>
</head>

<body>

<div class="header">
  <h2>출석 체크</h2>
</div>

<div class="top">
  <input id="search" placeholder="이름 검색" oninput="render()">
</div>

<div class="top" id="adminPanel" style="display:none;">
  <input id="nameInput" placeholder="학생 이름">
  <button onclick="addStudent()">추가</button>
</div>

<div id="list"></div>
<div id="calendar"></div>

<button class="admin" onclick="toggleAdmin()">관리자</button>

<audio id="sound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b8b6f.mp3"></audio>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAOAYSvUXY5PNDfAgxBq0OVKAbkY0Tp7IM",
  authDomain: "student-attendence-e9f58.firebaseapp.com",
  databaseURL: "https://student-attendence-e9f58-default-rtdb.firebaseio.com",
  projectId: "student-attendence-e9f58"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let students = [];
let history = {};
let isAdmin = false;

db.ref("data").on("value", snap => {
  const val = snap.val() || {};
  students = val.students || [];
  history = val.history || {};
  render();
});

function save() {
  db.ref("data").set({ students, history });
}

function today() {
  return new Date().toISOString().split("T")[0];
}

function nowTime() {
  return new Date().toLocaleTimeString();
}

function toggleAdmin() {
  const pw = prompt("비밀번호");
  if (pw === "1234") {
    isAdmin = !isAdmin;
    document.getElementById("adminPanel").style.display = isAdmin ? "flex" : "none";
    render();
  }
}

function addStudent() {
  const name = document.getElementById("nameInput").value.trim();
  if (!name) return;
  students.push({ name, count: 10 });
  save();
}

function deleteStudent(i) {
  if (!confirm("삭제?")) return;
  students.splice(i,1);
  save();
}

function attend(i, el) {
  if (students[i].count <= 0) return;

  // 🔊 소리
  const sound = document.getElementById("sound");
  sound.currentTime = 0;
  sound.play().catch(()=>{});

  // 🔥 버튼 애니메이션
  el.classList.add("click");
  setTimeout(()=>el.classList.remove("click"),100);

  // ✨ 팡 효과
  const pop = document.createElement("div");
  pop.className = "pop";
  pop.innerText = "✨";
  pop.style.left = event.clientX + "px";
  pop.style.top = event.clientY + "px";
  document.body.appendChild(pop);
  setTimeout(()=>pop.remove(),600);

  const name = students[i].name;
  const date = today();

  if (!history[date]) history[date] = [];
  history[date].push({ name, time: nowTime() });

  students[i].count--;
  save();
}

function filtered() {
  const q = document.getElementById("search").value.toLowerCase();
  return students.filter(s => s.name.toLowerCase().includes(q));
}

function showCalendar(name) {
  const cal = document.getElementById("calendar");
  cal.innerHTML = "<div class='calendar'></div>";

  const container = cal.querySelector(".calendar");

  for (let i=1; i<=31; i++) {
    const date = "2026-03-" + String(i).padStart(2,"0");

    const div = document.createElement("div");
    div.className = "day";
    div.innerText = i;

    if (history[date]) {
      history[date].forEach(r=>{
        if (r.name === name) div.classList.add("active");
      });
    }

    div.onclick = ()=>{
      if (!isAdmin) return;

      if (confirm(date + " 삭제?")) {
        history[date] = (history[date]||[]).filter(r=>r.name!==name);
        let s = students.find(x=>x.name===name);
        if (s) s.count++;
        save();
      }
    };

    container.appendChild(div);
  }
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  filtered().forEach((s,i)=>{
    const realIndex = students.indexOf(s);

    const div = document.createElement("div");
    div.className = "student";

    div.innerHTML = `
      <div onclick="showCalendar('${s.name}')">
        ${s.name} (${s.count})
      </div>
      <div>
        <button onclick="attend(${realIndex}, this)">출석</button>
        ${isAdmin ? `<button class="delete" onclick="deleteStudent(${realIndex})">삭제</button>` : ""}
      </div>
    `;

    list.appendChild(div);
  });
}
</script>

</body>
</html>
