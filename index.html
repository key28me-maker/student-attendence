<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Your art studio</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#9fbfaf;
}
h1{
  text-align:center;
  margin-top:40px;
}
.card{
  background:#eee;
  margin:10px;
  padding:15px;
  border-radius:10px;
}
button{
  margin-left:10px;
}
#adminBtn{
  position:fixed;
  bottom:20px;
  right:20px;
}
</style>
</head>

<body>

<h1>Your art studio</h1>

<div id="list"></div>

<button id="adminBtn" onclick="adminLogin()">관리자</button>

<div id="admin" style="display:none; padding:20px;">
  <h3>학생 추가</h3>
  이름 <input id="name">
  횟수 <input id="count" type="number">
  기간(일) <input id="days" type="number">
  <button onclick="addStudent()">추가</button>

  <h3>월 매출</h3>
  <div id="money"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAOAYSvUXY5PNDfAgxBq0OVKAbkY0Tp7IM",
  authDomain: "student-attendence-e9f58.firebaseapp.com",
  databaseURL: "https://student-attendence-e9f58-default-rtdb.firebaseio.com",
  projectId: "student-attendence-e9f58"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const list = document.getElementById("list");
const moneyDiv = document.getElementById("money");

let isAdmin=false;
let data={};

window.adminLogin=function(){
  const pw=prompt("비밀번호");
  if(pw==="0000"){
    isAdmin=true;
    document.getElementById("admin").style.display="block";
  }
}

window.addStudent=function(){
  const name=document.getElementById("name").value;
  const count=Number(document.getElementById("count").value);
  const days=Number(document.getElementById("days").value);

  const newRef=push(ref(db,"students"));

  set(newRef,{
    name,
    count,
    total:count,
    start:Date.now(),
    days,
    memo:"",
    logs:[],
    payLogs:[{date:Date.now(), amount:count*10000}]
  });
}

function render(){
  list.innerHTML="";
  let totalMoney=0;

  Object.entries(data).forEach(([id,s])=>{

    const remainDays = s.days
      ? Math.ceil((s.start + s.days*86400000 - Date.now())/86400000)
      : "-";

    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <b>${s.name}</b> (${s.count}회 / ${remainDays}일)
      <button onclick="attend('${id}')">출석</button>
      ${isAdmin?`<button onclick="del('${id}')">삭제</button>`:""}
    `;

    // 문자 조건
    if(isAdmin){
      if(s.count===0){
        sendSMS(s.name,"<유월화실> "+s.name+"님, 수업횟수가 모두 소진되었습니다. 빠른 시일내에 다시 뵙길 바래요😔");
      }
      else if(remainDays<=3){
        sendSMS(s.name,`${s.name}님 수업횟수 ${s.count}회, 사용기한 ${remainDays}일 남았습니다`);
      }
    }

    list.appendChild(div);

    // 매출
    if(s.payLogs){
      s.payLogs.forEach(p=>{
        const d=new Date(p.date);
        if(d.getMonth()===new Date().getMonth()){
          totalMoney+=p.amount;
        }
      });
    }

  });

  moneyDiv.innerText="이번달 매출: "+totalMoney+"원";
}

window.attend=function(id){
  const s=data[id];
  if(s.count<=0) return alert("횟수 없음");

  update(ref(db,"students/"+id),{
    count:s.count-1
  });
}

window.del=function(id){
  if(confirm("삭제?")){
    remove(ref(db,"students/"+id));
  }
}

function sendSMS(name,msg){
  console.log("문자:",msg);
}

onValue(ref(db,"students"),snap=>{
  data=snap.val()||{};
  render();
});

</script>

</body>
</html>
