<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>출석 체크</title>

<style>
body {
  font-family: sans-serif;
  background:#c1e5d2;
  padding:20px;
  font-size:20px;
}

h1 { text-align:center; }

.top {
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

input {
  flex:1;
  padding:14px;
  font-size:20px;
}

button {
  padding:14px;
  border:none;
  border-radius:10px;
  background:#f3a4b0;
  color:white;
  font-size:20px;
}

.adminBtn {
  position:fixed;
  bottom:10px;
  right:10px;
  background:#333;
}

.student {
  background:white;
  padding:18px;
  margin-bottom:10px;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.delete { background:red; }

/* ✨ 반짝 */
@keyframes glow {
  0% { box-shadow:0 0 0px #fff; }
  50% { box-shadow:0 0 25px #fff; }
  100% { box-shadow:0 0 0px #fff; }
}
.flash { animation: glow 1s infinite; }

/* 달력 */
.calendarModal {
  position:fixed;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}
.calendarBox {
  background:white;
  padding:20px;
  border-radius:15px;
  width:90%;
  max-width:500px;
}
.calendar { display:grid; grid-template-columns:repeat(7,1fr); gap:8px; }
.day { padding:10px; text-align:center; background:#eee; border-radius:8px; }
.today { border:3px solid #5f9578; }
.sunday { color:#e881c6; }
.saturday { color:#82d3e8; }
</style>
</head>

<body>

<h1>출석 체크</h1>

<div class="top">
  <input id="search" placeholder="이름 검색" oninput="render()">
</div>

<div class="top" id="adminPanel" style="display:none;">
  <input id="nameInput" placeholder="학생 이름">
  <button onclick="addStudent()">추가</button>
</div>

<div id="list"></div>

<button class="adminBtn" onclick="toggleAdmin()">관리자</button>

<!-- 🔊 오디오 직접 삽입 -->
<audio id="dingSound" src="dingdong.mp3" preload="auto"></audio>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAOAYSvUXY5PNDfAgxBq0OVKAbkY0Tp7IM",
  authDomain: "student-attendence-e9f58.firebaseapp.com",
  databaseURL: "https://student-attendence-e9f58-default-rtdb.firebaseio.com",
  projectId: "student-attendence-e9f58"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let students = [];
let history = {};
let isAdmin = false;
let lastClicked = null;
let currentDate = new Date();

const sound = document.getElementById("dingSound");

// Firebase
db.ref("data").on("value", (snap) => {
  const val = snap.val();
  if (val) {
    students = val.students || [];
    history = val.history || {};
  }
  render();
});

function save(){
  db.ref("data").set({ students, history });
}

function toggleAdmin(){
  const pw = prompt("비밀번호");
  if(pw==="1234"){
    isAdmin = !isAdmin;
    document.getElementById("adminPanel").style.display = isAdmin?"flex":"none";
    render();
  }
}

function addStudent(){
  const name = document.getElementById("nameInput").value.trim();
  if(!name) return;
  students.push({name, count:10});
  save();
}

function attend(i){
  if(students[i].count<=0) return alert("횟수 없음");

  const date = new Date().toISOString().split("T")[0];
  if(!history[date]) history[date]=[];

  history[date].push({name:students[i].name});
  students[i].count--;

  // 🔊 소리 (확실하게)
  sound.currentTime = 0;
  sound.play().catch(()=>{});

  lastClicked = students[i].name;

  save();

  setTimeout(()=>{
    lastClicked = null;
    render();
  },3000);
}

function deleteStudent(i){
  if(!confirm("삭제?")) return;
  students.splice(i,1);
  save();
}

function changeCount(i){
  const v = prompt("새 횟수", students[i].count);
  if(v===null) return;
  const num = Number(v);
  if(isNaN(num)) return alert("숫자 입력");
  students[i].count = num;
  save();
}

function render(){
  const list = document.getElementById("list");
  list.innerHTML="";

  const q = document.getElementById("search").value.toLowerCase();

  students.filter(s=>s.name.toLowerCase().includes(q))
  sort((a,b)=>a.name.localeCompare(b.name))
  .forEach((s,i)=>{
    const realIndex = students.indexOf(s);

    const div = document.createElement("div");
    div.className="student";

    if(s.name===lastClicked) div.classList.add("flash");

    div.innerHTML=`
      <div>${s.name} (남은:${s.count})</div>
      <div>
        <button onclick="attend(${realIndex})">출석</button>
        ${isAdmin?`
          <button onclick="changeCount(${realIndex})">수정</button>
          <button class="delete" onclick="deleteStudent(${realIndex})">삭제</button>
        `:""}
      </div>
    `;

    list.appendChild(div);
  });
}

</script>

</body>
</html>
