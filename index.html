
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Your art studio</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<!-- SheetJS (엑셀 생성용) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{font-family:sans-serif;background:#9fbfaf;zoom:2;}
h1{text-align:center;}

.card{
  background:#fff;
  margin:5px;
  padding:7px;
  border-radius:12px;
  display:flex;
  align-items:center;
}

.name{font-weight:bold;cursor:pointer;font-size:1.5em;}
.info{margin-left:10px;font-size:1.5em;}
.right{margin-left:16px;display:flex;gap:6px;align-items:center;}
.right button{font-size:1.5em;padding:6px 14px;}

#adminPanel{
  display:none;
  background:#fff;
  padding:10px;
  margin:10px;
  border-radius:10px;
}

#adminBtn{
  position:fixed;
  bottom:80px;
  right:20px;
}

#modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  z-index:100;
}

#modalContent{
  background:#fff;
  width:420px;
  margin:50px auto;
  padding:20px;
  border-radius:12px;
}

input,textarea{width:100%;margin-bottom:10px;}

/* 문자 버튼: 남은일수에 따라 색 구분 */
.smsBtn{
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:1.5em;
  padding:6px 14px;
  cursor:pointer;
}
.smsBtn.warn30{background:#4caf50;}  /* 30일 이하 - 초록 */
.smsBtn.warn15{background:#ffa500;}  /* 15일 이하 - 주황 */
.smsBtn.warn7 {background:#ff4444;}  /* 7일 이하  - 빨강 */

.excelBtn{background:#217346;color:#fff;border:none;border-radius:8px;padding:6px 14px;cursor:pointer;margin-top:8px;}
</style>
</head>

<body>

<h1>Your art studio</h1>

<div id="adminPanel">
  이름 <input id="s_name">
  횟수 <input id="s_count" type="number">
  기간 <input id="s_days" type="number" value="30">
  전화번호 <input id="s_phone">
  <button onclick="addStudent()">학생추가</button>

  <h3 style="margin-top:20px;">이번달 매출: <span id="monthTotal">0</span>원</h3>
  <button class="excelBtn" onclick="downloadExcel()">📊 출석 엑셀 다운로드</button>
</div>

<div id="list"></div>

<button id="adminBtn" onclick="adminLogin()">관리자</button>

<!-- 학생 관리 모달 -->
<div id="modal" onclick="closeModal(event)">
  <div id="modalContent" onclick="event.stopPropagation()">

    <h3>학생 관리</h3>

    이름 <input id="m_name">
    전화번호 <input id="m_phone">
    남은횟수 <input id="m_count" type="number">
    남은일수 <input id="m_days" type="number">
    금액 <input id="m_price" type="number">
    메모 <textarea id="m_memo"></textarea>

    <h4>💰 결제 추가</h4>
    <input id="payInput" type="number">
    <button onclick="addPayment()">추가</button>

    <h4>결제 로그</h4>
    <div id="m_pay"></div>

    <h4>출석 로그</h4>
    <div id="m_logs"></div>

    <button onclick="saveStudent()">저장</button>
    <button onclick="deleteStudent()">삭제</button>
    <button onclick="closeModal()">닫기</button>

  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAOAYSvUXY5PNDfAgxBq0OVKAbkY0Tp7IM",
  databaseURL: "https://student-attendence-e9f58-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let data={}, currentId=null, isAdmin=false;

const ding = new Audio("https://key28me-maker.github.io/student-attendence/dingdong.mp3");

// 관리자 로그인
window.adminLogin=function(){
  if(prompt("비밀번호")==="0000"){
    isAdmin=true;
    document.getElementById("adminPanel").style.display="block";
    render();
  }
}

// 학생 추가
window.addStudent=function(){
  const nameVal  = document.getElementById("s_name").value.trim();
  const countVal = Number(document.getElementById("s_count").value);
  const daysVal  = Number(document.getElementById("s_days").value) || 30;
  const phoneVal = document.getElementById("s_phone").value.trim();

  if(!nameVal) return alert("이름을 입력해주세요.");

  const newRef=push(ref(db,"students"));
  set(newRef,{
    name:nameVal,
    count:countVal,
    days:daysVal,
    phone:phoneVal,
    start:Date.now(),
    memo:"",
    price:0,
    logs:{},
    payments:{}
  });

  document.getElementById("s_name").value="";
  document.getElementById("s_count").value="";
  document.getElementById("s_days").value="30";
  document.getElementById("s_phone").value="";
}

// 출석 — 마이너스 허용 (횟수 제한 없음)
window.attend=function(id){
  const s=data[id];

  ding.currentTime=0;
  ding.play();

  const today=new Date().toISOString().slice(0,10);

  update(ref(db,"students/"+id),{
    count:s.count-1,
    ["logs/"+today]:true
  });
}

// 문자 전송 — 상황별 멘트 4가지
window.sendSMS=function(id){
  const s=data[id];
  if(!s) return;

  const remain=(s.start && s.days)
    ? Math.ceil((s.start+s.days*86400000-Date.now())/86400000)
    : null;

  let msg="";
  if(s.count<=0){
    msg=`${s.name}님 안녕하세요 유월화실입니다. 수강권이 모두 소진되었습니다. 그림실력이 도망가기전에 꼭 다시 뵈어요!♥^ㅁ^`;
  } else if(remain!==null && remain<=7){
    msg=`${s.name}님 안녕하세요 유월화실입니다. 수강권이 ${s.count}회, 수강기간 ${remain}일 남았습니다. 수강권 소진 전 방문부탁드립니다♥`;
  } else if(remain!==null && remain<=15){
    msg=`${s.name}님 안녕하세요 유월화실입니다. 수강권이 ${s.count}회, 수강기간 ${remain}일 남았습니다^^ 빠른 시일내 방문 부탁드립니다♥`;
  } else {
    msg=`${s.name}님 안녕하세요 유월화실입니다. 수강권이 ${s.count}회, 수강기간이 ${remain}일 남았습니다^^ 편한 시간에 방문 부탁드립니다♥`;
  }

  location.href=`sms:${s.phone}?body=${encodeURIComponent(msg)}`;
}

// 모달 열기
window.openModal=function(id){
  if(!isAdmin) return;

  currentId=id;
  const s=data[id];

  document.getElementById("m_name").value=s.name||"";
  document.getElementById("m_phone").value=s.phone||"";
  document.getElementById("m_count").value=s.count||0;
  document.getElementById("m_price").value=s.price||0;
  const remainDays=(s.start&&s.days)?Math.ceil((s.start+s.days*86400000-Date.now())/86400000):0;
  document.getElementById("m_days").value=remainDays;
  document.getElementById("m_memo").value=s.memo||"";

  renderLogs(s);
  renderPayments(s);

  document.getElementById("modal").style.display="block";
}

// 닫기
window.closeModal=function(){
  document.getElementById("modal").style.display="none";
}

// 저장
window.saveStudent=function(){
  const newRemain=Number(document.getElementById("m_days").value);
  update(ref(db,"students/"+currentId),{
    name:document.getElementById("m_name").value,
    phone:document.getElementById("m_phone").value,
    count:Number(document.getElementById("m_count").value),
    price:Number(document.getElementById("m_price").value),
    memo:document.getElementById("m_memo").value,
    start:Date.now(),
    days:newRemain
  });
  closeModal();
}

// 삭제
window.deleteStudent=function(){
  if(confirm("삭제?")){
    remove(ref(db,"students/"+currentId));
    closeModal();
  }
}

// 결제 추가
window.addPayment=function(){
  const amount=Number(document.getElementById("payInput").value);
  if(!amount) return;

  const key=push(ref(db,"students/"+currentId+"/payments")).key;
  update(ref(db,"students/"+currentId+"/payments/"+key),{
    amount,
    date:Date.now()
  });

  document.getElementById("payInput").value="";
}

window.delPay=function(k){
  remove(ref(db,"students/"+currentId+"/payments/"+k));
}

function renderPayments(s){
  const el=document.getElementById("m_pay");
  el.innerHTML="";
  if(s.payments){
    Object.entries(s.payments).forEach(([k,p])=>{
      el.innerHTML+=`${new Date(p.date).toLocaleDateString()} ${p.amount}원
        <button onclick="delPay('${k}')">❌</button><br>`;
    });
  }
}

function renderLogs(s){
  const el=document.getElementById("m_logs");
  el.innerHTML="";
  if(s.logs){
    Object.keys(s.logs).sort().reverse().forEach(d=>{
      el.innerHTML+=d+"<br>";
    });
  }
}

// 월매출
function calcMonthTotal(){
  let total=0;
  const now=new Date();
  Object.values(data).forEach(s=>{
    if(s.payments){
      Object.values(s.payments).forEach(p=>{
        const d=new Date(p.date);
        if(d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear()){
          total+=p.amount;
        }
      });
    }
  });
  if(isAdmin) document.getElementById("monthTotal").innerText=total;
}

// 엑셀 다운로드
window.downloadExcel=function(){
  const wb=XLSX.utils.book_new();

  // 시트1: 출석 로그
  const allDates=new Set();
  Object.values(data).forEach(s=>{
    if(s.logs) Object.keys(s.logs).forEach(d=>allDates.add(d));
  });
  const sortedDates=Array.from(allDates).sort();
  const logRows=[["이름",...sortedDates]];
  Object.values(data).forEach(s=>{
    const row=[s.name||""];
    sortedDates.forEach(d=>row.push(s.logs&&s.logs[d]?"✓":""));
    logRows.push(row);
  });
  const ws1=XLSX.utils.aoa_to_sheet(logRows);
  ws1["!cols"]=[{wch:12},...sortedDates.map(()=>({wch:12}))];
  XLSX.utils.book_append_sheet(wb,ws1,"출석 로그");

  // 시트2: 학생 현황
  const now=Date.now();
  const statusRows=[["이름","남은 횟수","남은 일수","전화번호","메모"]];
  Object.values(data).forEach(s=>{
    const remain=(s.start&&s.days)
      ?Math.ceil((s.start+s.days*86400000-now)/86400000)
      :"-";
    statusRows.push([s.name||"",s.count||0,remain,s.phone||"",s.memo||""]);
  });
  const ws2=XLSX.utils.aoa_to_sheet(statusRows);
  ws2["!cols"]=[{wch:12},{wch:10},{wch:10},{wch:16},{wch:24}];
  XLSX.utils.book_append_sheet(wb,ws2,"학생 현황");

  const dateStr=new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb,`출석부_${dateStr}.xlsx`);
}

// 화면 렌더링
function render(){
  const listEl=document.getElementById("list");
  listEl.innerHTML="";

  Object.entries(data).sort((a,b)=>(a[1].name||'').localeCompare(b[1].name||'','ko')).forEach(([id,s])=>{
    let remain="-";
    if(s.start&&s.days){
      remain=Math.ceil((s.start+s.days*86400000-Date.now())/86400000);
    }

    // 문자 버튼: 필요한 학생에게만 표시
    let smsBtn="";
    if(isAdmin){
      if(s.count<=0){
        smsBtn=`<button class="smsBtn warn7" onclick="sendSMS('${id}')">📩 문자</button>`;
      } else if(remain!=="-" && remain<=7){
        smsBtn=`<button class="smsBtn warn7" onclick="sendSMS('${id}')">📩 문자</button>`;
      } else if(remain!=="-" && remain<=15){
        smsBtn=`<button class="smsBtn warn15" onclick="sendSMS('${id}')">📩 문자</button>`;
      } else if(remain!=="-" && remain<=30){
        smsBtn=`<button class="smsBtn warn30" onclick="sendSMS('${id}')">📩 문자</button>`;
      }
    }

    listEl.innerHTML+=`
      <div class="card">
        <div class="name" onclick="openModal('${id}')">${s.name}</div>
        <div class="info">(${s.count}회 / ${remain}일)</div>
        <div class="right">
          <button onclick="attend('${id}')">출석</button>
          ${smsBtn}
        </div>
      </div>
    `;
  });

  calcMonthTotal();
}

// 데이터 실시간 구독
onValue(ref(db,"students"),snap=>{
  data=snap.val()||{};
  render();
});

</script>
</body>
</html>
