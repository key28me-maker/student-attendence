<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>н•ҷмӣҗ мҡҙмҳҒ мӢңмҠӨн…ң</title>

<style>
body { font-family:sans-serif; background:#c1e5d2; padding:20px;}
.top { display:flex; gap:10px; margin-bottom:10px;}
input { flex:1; padding:12px;}
button { padding:10px; border:none; border-radius:8px; background:#f3a4b0; color:white;}
.student { background:white; padding:15px; margin-bottom:10px; border-radius:10px; display:flex; justify-content:space-between; align-items:center;}
.left { display:flex; gap:15px; align-items:center;}
.name { font-weight:bold;}
.info { color:#555;}
.adminBtn { position:fixed; bottom:10px; right:10px; background:#333;}
.smsFlash { animation: glow 1s infinite; background:#ff6b6b;}
@keyframes glow {0%{box-shadow:0 0 0}50%{box-shadow:0 0 20px #fff}100%{box-shadow:0 0 0}}

.modal {position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;justify-content:center;align-items:center;}
.box {background:white;padding:20px;border-radius:10px;width:90%;max-width:400px;}
</style>
</head>

<body>

<h1>н•ҷмӣҗ мҡҙмҳҒ мӢңмҠӨн…ң</h1>

<div id="dashboard"></div>
<div id="todoBox"></div>
<div id="smsBox"></div>

<div class="top" id="adminPanel" style="display:none;">
<input id="nameInput" placeholder="н•ҷмғқ мқҙлҰ„">
<input id="phoneInput" placeholder="н•ҷмғқ лІҲнҳё">
<input id="parentPhoneInput" placeholder="ліҙнҳёмһҗ лІҲнҳё">
<input id="periodInput" placeholder="кё°к°„(мқј)">
<input id="priceInput" placeholder="мҲҳк°•лЈҢ">
<button onclick="addStudent()">м¶”к°Җ</button>
</div>

<div id="list"></div>
<button class="adminBtn" onclick="toggleAdmin()">кҙҖлҰ¬мһҗ</button>

<div class="modal" id="modal" onclick="closeModal(event)">
  <div class="box" id="modalBox"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey:"AIzaSyAOAYSvUXY5PNDfAgxBq0OVKAbkY0Tp7IM",
  authDomain:"student-attendence-e9f58.firebaseapp.com",
  databaseURL:"https://student-attendence-e9f58-default-rtdb.firebaseio.com",
  projectId:"student-attendence-e9f58"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

const list = document.getElementById("list");
const dashboard = document.getElementById("dashboard");
const todoBox = document.getElementById("todoBox");
const smsBox = document.getElementById("smsBox");
const adminPanel = document.getElementById("adminPanel");
const modal = document.getElementById("modal");
const modalBox = document.getElementById("modalBox");

let students=[], history={}, sales=[], isAdmin=false;

function today(){return new Date().toISOString().split("T")[0];}

db.ref("data").on("value",snap=>{
 const v=snap.val();
 if(v){
  students=v.students||[];
  history=v.history||{};
  sales=v.sales||[];
 }
 render();
});

function save(){db.ref("data").set({students,history,sales});}

function normalizeStudent(s){
 if(!s.period) s.period=30;
 if(!s.startDate) s.startDate=today();
 if(!s.notified) s.notified={};
 if(!s.price) s.price=0;
 return s;
}

function toggleAdmin(){
 if(prompt("л№„л°ҖлІҲнҳё")==="1234"){
  isAdmin=!isAdmin;
  adminPanel.style.display=isAdmin?"flex":"none";
  render();
 }
}

function addStudent(){
 const name=nameInput.value.trim();
 const phone=phoneInput.value.trim();
 const parentPhone=parentPhoneInput.value.trim();
 const period=+periodInput.value;
 const price=+priceInput.value;

 if(!name||!phone||!period||!price) return alert("мһ…л Ҙ л¶ҖмЎұ");

 students.push({
  name, phone, parentPhone,
  period, price,
  count:4,
  startDate:today(),
  notified:{}
 });

 save();
}

function getDaysLeft(s){
 let d=new Date(s.startDate);
 d.setDate(d.getDate()+s.period);
 return Math.ceil((d-new Date())/(1000*60*60*24));
}

function attend(i){
 history[today()]=history[today()]||[];
 history[today()].push({name:students[i].name});
 students[i].count--;
 save();
}

function sendSMS(s,msg,toParent=false){
 const phone = toParent && s.parentPhone ? s.parentPhone : s.phone;
 location.href=`sms:${phone}?body=${encodeURIComponent(msg)}`;
 s.notified[today()]=true;
 save();
}

function resetStudent(i){
 const s=students[i];
 sales.push({name:s.name,price:s.price,date:today()});
 s.count=4;
 s.startDate=today();
 s.notified={};
 save();
}

// рҹ”Ҙ н•өмӢ¬: мғҒм„ё + мҲҳм • нҸ¬н•Ё
function showStudentDetail(name){
 if(!isAdmin) return;

 const s = students.find(x=>x.name===name);
 const list = sales.filter(v=>v.name===name);

 modalBox.innerHTML=`
  <h3>${name}</h3>
  лӮЁмқҖ нҡҹмҲҳ: ${s.count}нҡҢ<br>
  мҲҳк°•лЈҢ: ${s.price.toLocaleString()}мӣҗ<br><br>

  <button onclick="editCount('${name}')">нҡҹмҲҳ мҲҳм •</button>

  <hr>
  <b>кІ°м ң мқҙл Ҙ</b><br>
  ${list.length ? list.map(v=>v.date+" / "+v.price+"мӣҗ").join("<br>") : "м—ҶмқҢ"}
 `;
 modal.style.display="flex";
}

// рҹ”Ҙ нҡҹмҲҳ мҲҳм •
function editCount(name){
 const s = students.find(x=>x.name===name);
 const v = prompt("мғҲ нҡҹмҲҳ мһ…л Ҙ", s.count);
 if(v===null) return;

 const num = Number(v);
 if(isNaN(num)) return alert("мҲ«мһҗл§Ң");

 s.count = num;
 save();
 render();
}

function closeModal(e){
 if(e.target.id==="modal") modal.style.display="none";
}

function render(){
 list.innerHTML="";
 let smsList=[], todo=[];

 students.forEach((raw,i)=>{
  const s = normalizeStudent(raw);
  const d=getDaysLeft(s);
  let btn="";

  if(isAdmin && !s.notified[today()]){
    if(s.count<=2 || d<=3){
      const msg=`${s.name}лӢҳ, ${d}мқј / ${s.count}нҡҢ лӮЁм•ҳмҠөлӢҲлӢӨ.`;

      btn=`
        <button class="smsFlash" onclick='sendSMS(${JSON.stringify(s)}, "${msg}")'>н•ҷмғқ</button>
        ${s.parentPhone?`<button onclick='sendSMS(${JSON.stringify(s)}, "${msg}", true)'>ліҙнҳёмһҗ</button>`:""}
      `;

      smsList.push(s.name);
      todo.push(s.name+" л¬ёмһҗ");
    }
  }

  if(s.count<=0) todo.push(s.name+" кІ°м ңн•„мҡ”");
  if(d<=3) todo.push(s.name+" л§ҢлЈҢмһ„л°•");

  list.innerHTML+=`
  <div class="student">
    <div class="left" onclick="showStudentDetail('${s.name}')">
      <div class="name">${s.name}</div>
      <div class="info">${s.count}нҡҢ</div>
      <div class="info">${d}мқј</div>
    </div>
    <div>
      <button onclick="attend(${i})">м¶ңм„қ</button>
      ${btn}
      ${isAdmin?`<button onclick="resetStudent(${i})">кІ°м ң</button>`:""}
    </div>
  </div>`;
 });

 if(isAdmin){
  let total=0;
  const ym=new Date().toISOString().slice(0,7);
  sales.forEach(s=>{if(s.date.startsWith(ym)) total+=s.price||0;});
  dashboard.innerHTML=`рҹ“Ҡ мқҙлІҲлӢ¬ л§Өм¶ң: ${total.toLocaleString()}мӣҗ`;
 } else {
  dashboard.innerHTML="";
 }

 todoBox.innerHTML = isAdmin && todo.length ? "<b>мҳӨлҠҳ н• мқј</b><br>"+todo.join("<br>") : "";
 smsBox.innerHTML = isAdmin && smsList.length ? "<b>л¬ёмһҗ лҢҖмғҒ</b><br>"+smsList.join(", ") : "";
}
</script>
</body>
</html>
