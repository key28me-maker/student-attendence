<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>유월화실</title>

<style>
body { font-family:sans-serif; background:#c1e5d2; padding:50px; font-size:2.5em;}
.top { display:flex; gap:20px; margin-bottom:20px;}
input { flex:1; padding:30px; font-size:1em;}
button { padding:25px 35px; border:none; border-radius:15px; background:#f3a4b0; color:white; font-size:1em;}
.student { background:white; padding:40px; margin-bottom:20px; border-radius:20px; display:flex; justify-content:space-between; align-items:center;}
.left { display:flex; gap:30px; align-items:center;}
.name { font-weight:bold;}
.info { color:#555;}
.adminBtn { position:fixed; bottom:30px; right:30px; background:#333; font-size:0.8em;}
.smsFlash { animation: glow 1s infinite; background:#ff6b6b;}
@keyframes glow {0%{box-shadow:0 0 0}50%{box-shadow:0 0 30px #fff}100%{box-shadow:0 0 0}}

.modal {position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;justify-content:center;align-items:center;}
.box {background:white;padding:40px;border-radius:20px;width:90%;max-width:700px;}
</style>
</head>

<body>

<h1>유월화실</h1>

<div id="dashboard"></div>
<div id="todoBox"></div>
<div id="smsBox"></div>

<div class="top" id="adminPanel" style="display:none;">
<input id="nameInput" placeholder="학생 이름">
<input id="phoneInput" placeholder="전화번호">
<input id="periodInput" placeholder="기간(일)">
<input id="priceInput" placeholder="수강료">
<button onclick="addStudent()">추가</button>
</div>

<div id="list"></div>
<button class="adminBtn" onclick="toggleAdmin()">관리자</button>

<div class="modal" id="modal" onclick="closeModal(event)">
  <div class="box" id="modalBox"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey:"AIzaSyAOAYSvUXY5PNDfAgxBq0OVKAbkY0Tp7IM",
  authDomain:"student-attendence-e9f58.firebaseapp.com",
  databaseURL:"https://student-attendence-e9f58-default-rtdb.firebaseio.com",
  projectId:"student-attendence-e9f58"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

const list = document.getElementById("list");
const dashboard = document.getElementById("dashboard");
const todoBox = document.getElementById("todoBox");
const smsBox = document.getElementById("smsBox");
const adminPanel = document.getElementById("adminPanel");
const modal = document.getElementById("modal");
const modalBox = document.getElementById("modalBox");

let students=[], history={}, sales=[], isAdmin=false;

function today(){return new Date().toISOString().split("T")[0];}

db.ref("data").on("value",snap=>{
 const v=snap.val();
 if(v){
  students=v.students||[];
  history=v.history||{};
  sales=v.sales||[];
 }
 render();
});

function save(){db.ref("data").set({students,history,sales});}

function normalizeStudent(s){
 if(!s.period) s.period=30;
 if(!s.startDate) s.startDate=today();
 if(!s.notified) s.notified={};
 if(!s.price) s.price=0;
 if(!s.phone) s.phone="";
 return s;
}

function toggleAdmin(){
 if(prompt("비밀번호")==="1234"){
  isAdmin=!isAdmin;
  adminPanel.style.display=isAdmin?"flex":"none";
  render();
 }
}

function addStudent(){
 const name=nameInput.value.trim();
 const phone=phoneInput.value.trim();
 const period=+periodInput.value;
 const price=+priceInput.value;

 if(!name||!phone||!period||!price) return alert("입력 부족");

 students.push({
  name, phone,
  period, price,
  count:4,
  startDate:today(),
  notified:{}
 });

 save();
}

function getDaysLeft(s){
 let d=new Date(s.startDate);
 d.setDate(d.getDate()+s.period);
 return Math.ceil((d-new Date())/(1000*60*60*24));
}

function attend(i){
 if(!confirm("출석하시겠습니까?")) return;

 history[today()]=history[today()]||[];
 history[today()].push({name:students[i].name});
 students[i].count--;
 save();
}

function sendSMS(s,msg){
 location.href=`sms:${s.phone}?body=${encodeURIComponent(msg)}`;
 s.notified[today()]=true;
 save();
}

function resetStudent(i){
 const s=students[i];
 sales.push({name:s.name,price:s.price,date:today()});
 s.count=4;
 s.startDate=today();
 s.notified={};
 save();
}

function deleteStudent(name){
 if(!confirm(name+" 삭제할까?")) return;
 students = students.filter(s=>s.name!==name);
 save();
}

function showStudentDetail(name){
 if(!isAdmin) return;

 const s = students.find(x=>x.name===name);

 modalBox.innerHTML=`
  <h3>${name}</h3>

  전화번호<br>
  <input id="editPhone" value="${s.phone}"><br><br>

  남은 횟수<br>
  <input id="editCount" value="${s.count}"><br><br>

  남은 기간(일)<br>
  <input id="editPeriod" value="${s.period}"><br><br>

  수강료<br>
  <input id="editPrice" value="${s.price}"><br><br>

  <button onclick="saveEdit('${name}')">저장</button>
  <button onclick="deleteStudent('${name}')">삭제</button>
 `;

 modal.style.display="flex";
}

function saveEdit(name){
 const s = students.find(x=>x.name===name);

 s.phone = document.getElementById("editPhone").value;
 s.count = Number(document.getElementById("editCount").value);
 s.period = Number(document.getElementById("editPeriod").value);
 s.price = Number(document.getElementById("editPrice").value);

 save();
 modal.style.display="none";
 render();
}

function closeModal(e){
 if(e.target.id==="modal") modal.style.display="none";
}

function render(){
 list.innerHTML="";
 let smsList=[], todo=[];

 students.forEach((raw,i)=>{
  const s = normalizeStudent(raw);
  const d=getDaysLeft(s);
  let btn="";

  // 🔥 변경된 문자 조건
  if(isAdmin && !s.notified[today()]){
    if([15,7,3].includes(d)){
      const msg=`${s.name}님, 사용기한 ${d}일 남았습니다.`;

      btn=`<button class="smsFlash" onclick='sendSMS(${JSON.stringify(s)}, "${msg}")'>문자</button>`;
      smsList.push(s.name);
      todo.push(s.name+" 문자");
    }
  }

  if(s.count<=0) todo.push(s.name+" 결제필요");
  if(d<=3) todo.push(s.name+" 만료임박");

  list.innerHTML+=`
  <div class="student">
    <div class="left" onclick="showStudentDetail('${s.name}')">
      <div class="name">${s.name}</div>
      <div class="info">${s.count}회</div>
      <div class="info">${d}일</div>
    </div>
    <div>
      <button onclick="attend(${i})">출석</button>
      ${btn}
      ${isAdmin?`<button onclick="resetStudent(${i})">결제</button>`:""}
    </div>
  </div>`;
 });

 if(isAdmin){
  let total=0;
  const ym=new Date().toISOString().slice(0,7);
  sales.forEach(s=>{if(s.date.startsWith(ym)) total+=s.price||0;});
  dashboard.innerHTML=`📊 이번달 매출: ${total.toLocaleString()}원`;
 } else {
  dashboard.innerHTML="";
 }

 todoBox.innerHTML = isAdmin && todo.length ? "<b>오늘 할일</b><br>"+todo.join("<br>") : "";
 smsBox.innerHTML = isAdmin && smsList.length ? "<b>문자 대상</b><br>"+smsList.join(", ") : "";
}
</script>
</body>
</html>
