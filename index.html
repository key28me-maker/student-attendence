<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Your art studio</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
body{
  font-family:sans-serif;
  background:#a8c7b5;
  text-align:center;
}

h1{
  margin-top:40px;
}

input,button{
  padding:8px;
  margin:5px;
}

.student{
  background:#eee;
  margin:10px;
  padding:10px;
  border-radius:10px;
}

.adminBtn{
  position:fixed;
  bottom:20px;
  right:20px;
}

.hidden{display:none;}
</style>
</head>

<body>

<h1>Your art studio</h1>

<div id="adminPanel" class="hidden">
  <input id="name" placeholder="이름">
  <input id="count" placeholder="횟수" type="number">
  <input id="days" placeholder="기간(일)" type="number">
  <input id="phone" placeholder="전화번호">
  <button onclick="addStudent()">추가</button>
</div>

<div id="list"></div>

<button class="adminBtn" onclick="toggleAdmin()">관리자</button>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAOAYSvUXY5PNDfAgxBq0OVKAbkY0Tp7IM",
  authDomain: "student-attendence-e9f58.firebaseapp.com",
  databaseURL: "https://student-attendence-e9f58-default-rtdb.firebaseio.com",
  projectId: "student-attendence-e9f58"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let isAdmin=false;

function toggleAdmin(){
  if(!isAdmin){
    const pw=prompt("비밀번호");
    if(pw==="0000"){
      isAdmin=true;
      document.getElementById("adminPanel").classList.remove("hidden");
      render();
    }
  }else{
    isAdmin=false;
    document.getElementById("adminPanel").classList.add("hidden");
    render();
  }
}

function addStudent(){
  const name=document.getElementById("name").value;
  const count=Number(document.getElementById("count").value);
  const days=Number(document.getElementById("days").value);
  const phone=document.getElementById("phone").value;

  db.ref("students").push({
    name,
    count,
    days,
    phone,
    start:Date.now(),
    memo:"",
    logs:{},
    payments:{}
  });
}

function attend(key,data){
  if(data.count<=0){
    sendSMS(data.phone,`${data.name}님 수업횟수가 모두 소진되었습니다.`);
    return;
  }

  db.ref("students/"+key).update({
    count:data.count-1
  });

  const today=new Date().toISOString().slice(0,10);

  db.ref("students/"+key+"/logs/"+today).set(true);

  dingdong();
}

function dingdong(){
  const audio=new Audio("https://actions.google.com/sounds/v1/alarms/ding_dong.ogg");
  audio.play();
}

function sendSMS(phone,msg){
  alert("문자:\n"+msg);
}

function render(){
  db.ref("students").on("value",snap=>{
    const data=snap.val()||{};
    const list=document.getElementById("list");
    list.innerHTML="";

    let total=0;

    Object.keys(data).sort((a,b)=>{
      return data[a].name.localeCompare(data[b].name);
    }).forEach(key=>{
      const s=data[key];

      const today=new Date();
      const d=Math.floor((today - new Date(s.start))/86400000);
      const remain=s.days-d;

      let smsBtn="";
      if(isAdmin){
        if(remain<=15 && !s.notified15){
          smsBtn+=`<button onclick="notify('${key}',15)">문자15</button>`;
        }
        if(remain<=7 && !s.notified7){
          smsBtn+=`<button onclick="notify('${key}',7)">문자7</button>`;
        }
        if(remain<=3 && !s.notified3){
          smsBtn+=`<button onclick="notify('${key}',3)">문자3</button>`;
        }
      }

      let html=`
      <div class="student">
      <b onclick="showDetail('${key}')">${s.name}</b> (${s.count}회 / ${remain}일)
      <button onclick="attend('${key}',${JSON.stringify(s)})">출석</button>
      ${smsBtn}
      `;

      if(isAdmin){
        html+=`
        <button onclick="del('${key}')">삭제</button>
        <br>
        <textarea onchange="saveMemo('${key}',this.value)">${s.memo||""}</textarea>
        <br>
        <button onclick="pay('${key}')">결제</button>
        `;
      }

      html+=`</div>`;
      list.innerHTML+=html;

      if(s.payments){
        Object.values(s.payments).forEach(p=>{
          const month=new Date(p.date).getMonth();
          const now=new Date().getMonth();
          if(month===now) total+=p.amount;
        });
      }
    });

    if(isAdmin){
      list.innerHTML+=`<h3>월매출: ${total}원</h3>`;
    }
  });
}

function notify(key,day){
  db.ref("students/"+key).once("value",snap=>{
    const s=snap.val();
    sendSMS(s.phone,`${s.name}님 수업횟수 ${s.count}회, ${day}일 남았습니다`);
    db.ref("students/"+key+"/notified"+day).set(true);
  });
}

function saveMemo(key,val){
  db.ref("students/"+key).update({memo:val});
}

function del(key){
  if(confirm("삭제?")){
    db.ref("students/"+key).remove();
  }
}

function pay(key){
  const amount=Number(prompt("금액"));
  db.ref("students/"+key+"/payments").push({
    amount,
    date:Date.now()
  });
}

function showDetail(key){
  db.ref("students/"+key).once("value",snap=>{
    const s=snap.val();
    let txt="출석기록\n";

    if(s.logs){
      Object.keys(s.logs).forEach(d=>{
        txt+=d+"\n";
      });
    }

    txt+="\n결제기록\n";
    if(s.payments){
      Object.values(s.payments).forEach(p=>{
        txt+=new Date(p.date).toLocaleDateString()+" "+p.amount+"원\n";
      });
    }

    alert(txt);
  });
}

render();
</script>

</body>
</html>
