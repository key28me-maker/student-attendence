<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Your art studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body {
  font-family: sans-serif;
  background:#a8c5b5;
  padding:20px;
}
h1{
  text-align:center;
}
.card{
  background:white;
  margin:10px 0;
  padding:15px;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
button{
  margin-left:5px;
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:#ff8c8c;
  color:white;
}
.adminBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:black;
}
.smsFlash{
  animation:blink 1s infinite;
}
@keyframes blink{
  50%{opacity:0.3;}
}
</style>
</head>

<body>

<h1>Your art studio</h1>

<div id="list"></div>

<button class="adminBtn" onclick="toggleAdmin()">관리자</button>

<script>
// 🔥 여기에 너 firebase 설정 넣어
const firebaseConfig = {
  apiKey: "여기",
  authDomain: "여기",
  databaseURL: "여기",
  projectId: "여기",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let students = {};
let isAdmin = false;

// 🔥 데이터 불러오기
db.ref("students").on("value", snap=>{
  students = snap.val() || {};
  render();
});

// 🔥 화면 출력
function render(){
  const list = document.getElementById("list");
  list.innerHTML="";

  Object.entries(students).forEach(([id,s])=>{
    let d = s.days || 0;

    let btn = "";

    if(isAdmin){
      if(d<=15 && !s.notified?.["15"]){
        btn += `<button class="smsFlash" onclick="sendSMS('${id}','15')">문자</button>`;
      }
      if(s.count<=0){
        btn += `<button onclick="sendEnd('${id}')">문자</button>`;
      }
    }

    list.innerHTML += `
    <div class="card">
      <div onclick="openDetail('${id}')">
        ${s.name} (${s.count||0}회 / ${s.days||0}일)
      </div>
      <div>
        <button onclick="attend('${id}')">출석</button>
        ${btn}
        ${isAdmin ? `<button onclick="pay('${id}')">결제</button>`:""}
        ${isAdmin ? `<button onclick="del('${id}')">삭제</button>`:""}
      </div>
    </div>`;
  });
}

// 🔥 출석
function attend(id){
  if(!confirm("출석하시겠습니까?")) return;

  const s = students[id];
  let count = (s.count||0) - 1;

  db.ref("students/"+id+"/count").set(count);

  let log = s.logs || [];
  log.push(new Date().toISOString());
  db.ref("students/"+id+"/logs").set(log);

  new Audio("dingdong.mp3").play();
}

// 🔥 결제
function pay(id){
  let money = prompt("결제금액");
  let count = prompt("횟수 추가");
  let days = prompt("일수 추가");

  const s = students[id];

  db.ref("students/"+id).update({
    count: (s.count||0)+Number(count),
    days: (s.days||0)+Number(days)
  });

  let pays = s.pays || [];
  pays.push({
    money,
    date:new Date().toISOString()
  });

  db.ref("students/"+id+"/pays").set(pays);
}

// 🔥 문자
function sendSMS(id,type){
  const s = students[id];

  let msg = `안녕하세요 ${s.name}님 수업횟수 ${s.count}회, 사용기한 ${s.days}일 남았습니다`;

  alert(msg);

  let n = s.notified || {};
  n[type]=true;
  db.ref("students/"+id+"/notified").set(n);
}

// 🔥 횟수 0 문자
function sendEnd(id){
  const s = students[id];

  alert(`<유월화실> ${s.name}님 수업횟수가 모두 소진되었습니다 😔`);
}

// 🔥 삭제
function del(id){
  if(confirm("삭제?")){
    db.ref("students/"+id).remove();
  }
}

// 🔥 관리자
function toggleAdmin(){
  let pw = prompt("비번");
  if(pw==="1234"){
    isAdmin = !isAdmin;
    render();
  }
}

// 🔥 상세
function openDetail(id){
  if(!isAdmin) return;

  const s = students[id];

  let memo = prompt("메모", s.memo||"");
  db.ref("students/"+id+"/memo").set(memo);
}

// 🔥 학생 추가 (콘솔에서 사용)
function addStudent(name){
  const id = db.ref("students").push().key;

  db.ref("students/"+id).set({
    name,
    count:0,
    days:30,
    logs:[],
    pays:[],
    memo:"",
    notified:{}
  });
}

</script>

</body>
</html>
