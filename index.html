<!-- 중간 생략 없이 전체코드 -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your art studio</title>

<style>
body { font-family:sans-serif; background:#c1e5d2; padding:30px; font-size:1.5em;}
h1 { text-align:center; }

.top { display:flex; gap:15px; margin-bottom:15px;}
input { flex:1; padding:18px;}
button { padding:15px 20px; border:none; border-radius:10px; background:#f3a4b0; color:white;}
.student { background:white; padding:25px; margin-bottom:15px; border-radius:15px; display:flex; justify-content:space-between;}
.left { display:flex; gap:20px; align-items:center;}
.adminBtn { position:fixed; bottom:20px; right:20px; background:#333;}
.smsFlash { animation: glow 1s infinite; background:#ff6b6b;}
@keyframes glow {0%{box-shadow:0 0 0}50%{box-shadow:0 0 20px #fff}100%{box-shadow:0 0 0}}

.modal {position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;justify-content:center;align-items:center;}
.box {background:white;padding:30px;border-radius:15px;width:90%;max-width:500px;}
</style>
</head>

<body>

<h1>Your art studio</h1>

<audio id="dingSound" src="dingdong.mp3"></audio>

<div id="dashboard"></div>
<div id="todoBox"></div>
<div id="smsBox"></div>

<div class="top" id="adminPanel" style="display:none;">
<input id="nameInput" placeholder="학생 이름">
<input id="phoneInput" placeholder="전화번호">
<input id="periodInput" placeholder="기간(일)">
<input id="priceInput" placeholder="수강료">
<button onclick="addStudent()">추가</button>
</div>

<div id="list"></div>
<button class="adminBtn" onclick="toggleAdmin()">관리자</button>

<div class="modal" id="modal" onclick="closeModal(event)">
  <div class="box" id="modalBox"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey:"AIzaSyAOAYSvUXY5PNDfAgxBq0OVKAbkY0Tp7IM",
  authDomain:"student-attendence-e9f58.firebaseapp.com",
  databaseURL:"https://student-attendence-e9f58-default-rtdb.firebaseio.com",
  projectId:"student-attendence-e9f58"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

const list = document.getElementById("list");
const adminPanel = document.getElementById("adminPanel");
const sound = document.getElementById("dingSound");

let students=[], history={}, sales=[], isAdmin=false;

function today(){return new Date().toISOString().split("T")[0];}

db.ref("data").on("value",snap=>{
 const v=snap.val();
 if(v){
  students=v.students||[];
  history=v.history||{};
  sales=v.sales||[];
 }
 render();
});

function save(){db.ref("data").set({students,history,sales});}

function normalizeStudent(s){
 if(!s.notified) s.notified={};
 return s;
}

function toggleAdmin(){
 if(prompt("비밀번호")==="1234"){
  isAdmin=!isAdmin;
  adminPanel.style.display=isAdmin?"flex":"none";
  render();
 }
}

function getDaysLeft(s){
 let d=new Date(s.startDate);
 d.setDate(d.getDate()+s.period);
 return Math.ceil((d-new Date())/(1000*60*60*24));
}

function attend(i){
 if(!confirm("출석하시겠습니까?")) return;

 history[today()]=history[today()]||[];
 history[today()].push({name:students[i].name});
 students[i].count--;

 sound.currentTime=0;
 sound.play().catch(()=>{});

 save();
}

// 🔥 문자 발송
function sendSMS(s,day,msg){
 location.href=`sms:${s.phone}?body=${encodeURIComponent(msg)}`;
 s.notified[day]=true;
 save();
}

function render(){
 list.innerHTML="";

 const sorted=[...students].sort((a,b)=>a.name.localeCompare(b.name,'ko'));

 sorted.forEach((s)=>{
  const i=students.indexOf(s);
  const d=getDaysLeft(s);
  let btn="";

  if(isAdmin){
    if(d<=15 && !s.notified["15"]){
      btn=`<button class="smsFlash" onclick='sendSMS(students[${i}],"15","${s.name}님 15일 남았습니다")'>문자</button>`;
    }
    else if(d<=7 && !s.notified["7"]){
      btn=`<button class="smsFlash" onclick='sendSMS(students[${i}],"7","${s.name}님 7일 남았습니다")'>문자</button>`;
    }
    else if(d<=3 && !s.notified["3"]){
      btn=`<button class="smsFlash" onclick='sendSMS(students[${i}],"3","${s.name}님 3일 남았습니다")'>문자</button>`;
    }
  }

  list.innerHTML+=`
  <div class="student">
    <div class="left">
      ${s.name} (${s.count}회 / ${d}일)
    </div>
    <div>
      <button onclick="attend(${i})">출석</button>
      ${btn}
    </div>
  </div>`;
 });
}
</script>
</body>
</html>
