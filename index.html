<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your art studio</title>

<style>
body {
  font-family:sans-serif;
  background:#c1e5d2;
  padding:20px;
}

h1{
  text-align:center;
}

.student{
  background:white;
  padding:20px;
  margin-bottom:10px;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  background:#f3a4b0;
  color:white;
}

.adminBtn{
  position:fixed;
  bottom:10px;
  right:10px;
  background:#333;
}
</style>
</head>

<body>

<h1>Your art studio</h1>

<div id="list"></div>
<button class="adminBtn" onclick="toggleAdmin()">관리자</button>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey:"AIzaSyAOAYSvUXY5PNDfAgxBq0OVKAbkY0Tp7IM",
  authDomain:"student-attendence-e9f58.firebaseapp.com",
  databaseURL:"https://student-attendence-e9f58-default-rtdb.firebaseio.com",
  projectId:"student-attendence-e9f58"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let students = {};
let isAdmin = false;

// 🔥 안전하게 불러오기
db.ref("students").on("value", snap=>{
  students = snap.val() || {};
  render();
});

// 🔥 학생 추가 (개별 저장)
function addStudent(){
  const name = prompt("이름");
  if(!name) return;

  const id = Date.now();

  db.ref("students/"+id).set({
    name:name,
    count:10,
    days:30,
    phone:"",
    memo:""
  });
}

// 🔥 출석 (개별 수정)
function attend(id){
  if(!confirm("출석하시겠습니까?")) return;

  const s = students[id];
  db.ref("students/"+id).update({
    count:(s.count||0)-1
  });
}

// 🔥 삭제 (개별 삭제)
function deleteStudent(id){
  if(!confirm("삭제?")) return;
  db.ref("students/"+id).remove();
}

// 🔥 관리자 토글
function toggleAdmin(){
  const pw = prompt("비번");
  if(pw==="1234"){
    isAdmin=!isAdmin;
    render();
  }
}

// 🔥 렌더
function render(){
  const list = document.getElementById("list");
  list.innerHTML="";

  Object.keys(students).forEach(id=>{
    const s = students[id];

    const div = document.createElement("div");
    div.className="student";

    div.innerHTML=`
      <div>
        ${s.name} (${s.count||0}회 / ${s.days||0}일)
      </div>
      <div>
        <button onclick="attend('${id}')">출석</button>
        ${isAdmin?`
          <button onclick="deleteStudent('${id}')">삭제</button>
        `:""}
      </div>
    `;

    list.appendChild(div);
  });
}
</script>

</body>
</html>
