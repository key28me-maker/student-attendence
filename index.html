<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your art studio</title>

<style>
body { font-family:sans-serif; background:#c1e5d2; padding:30px; font-size:1.5em;}
h1 { text-align:center; }

.top { display:flex; gap:10px; margin-bottom:15px; flex-wrap:wrap;}
input, textarea { padding:15px;}
button { padding:12px 18px; border:none; border-radius:10px; background:#f3a4b0; color:white;}

.student { background:white; padding:20px; margin-bottom:10px; border-radius:15px; display:flex; justify-content:space-between;}
.left { display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
.memo { font-size:0.7em; color:#666;}

.adminBtn { position:fixed; bottom:20px; right:20px; background:#333;}

.smsFlash { animation: glow 1s infinite; background:#ff6b6b;}
@keyframes glow {50%{box-shadow:0 0 20px #fff}}

.chart {background:white; padding:15px; border-radius:15px; margin-top:10px;}
.bar {height:20px; background:#f3a4b0; margin:5px 0;}

.modal {position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;justify-content:center;align-items:center;}
.box {background:white;padding:20px;border-radius:15px;width:90%;max-width:400px;}
</style>
</head>

<body>

<h1>Your art studio</h1>

<audio id="dingSound" src="dingdong.mp3"></audio>

<div id="dashboard"></div>

<div class="top" id="adminPanel" style="display:none;">
<input id="nameInput" placeholder="이름">
<input id="phoneInput" placeholder="전화번호">
<input id="periodInput" placeholder="기간">
<input id="priceInput" placeholder="금액">
<button onclick="addStudent()">추가</button>

<input type="month" id="monthPicker">
<button onclick="showMonthSales()">월매출</button>
</div>

<div id="chartBox"></div>
<div id="list"></div>

<button class="adminBtn" onclick="toggleAdmin()">관리자</button>

<div class="modal" id="modal" onclick="closeModal(event)">
  <div class="box" id="modalBox"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
 apiKey:"AIzaSyAOAYSvUXY5PNDfAgxBq0OVKAbkY0Tp7IM",
 databaseURL:"https://student-attendence-e9f58-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let students=[], history={}, sales=[], isAdmin=false;

function today(){return new Date().toISOString().split("T")[0];}

// 데이터
db.ref("data").on("value",snap=>{
 const v=snap.val();
 if(v){
  students=v.students||[];
  history=v.history||{};
  sales=v.sales||[];
 }
 render();
});

function save(){
 db.ref("data").update({students,history,sales});
}

function toggleAdmin(){
 if(prompt("비밀번호")==="1234"){
  isAdmin=!isAdmin;
  adminPanel.style.display=isAdmin?"flex":"none";
  render();
 }
}

function addStudent(){
 students.push({
  name:nameInput.value,
  phone:phoneInput.value,
  period:+periodInput.value,
  price:+priceInput.value,
  count:4,
  startDate:today(),
  notified:{},
  memo:""
 });
 save();
}

function getDaysLeft(s){
 let d=new Date(s.startDate);
 d.setDate(d.getDate()+s.period);
 return Math.ceil((d-new Date())/86400000);
}

function attend(i){
 if(!confirm("출석하시겠습니까?")) return;
 students[i].count--;
 history[today()] = history[today()]||[];
 history[today()].push({name:students[i].name});
 dingSound.play().catch(()=>{});
 save();
}

function sendSMS(i,key,msg){
 location.href=`sms:${students[i].phone}?body=${encodeURIComponent(msg)}`;
 students[i].notified[key]=true;
 save();
}

function resetStudent(i){
 sales.push({name:students[i].name,price:students[i].price,date:today()});
 students[i].count=4;
 students[i].startDate=today();
 students[i].notified={};
 save();
}

// 🔥 월매출 + 그래프
function showMonthSales(){
 const val=monthPicker.value;
 if(!val) return alert("월 선택");

 let total=0;
 let map={};

 sales.forEach(s=>{
  if(s.date.startsWith(val)){
    total+=s.price;
    map[s.name]=(map[s.name]||0)+s.price;
  }
 });

 let html=`<div class="chart"><h3>${val} 매출: ${total.toLocaleString()}원</h3>`;

 for(let n in map){
  html+=`${n} (${map[n]})<div class="bar" style="width:${map[n]/1000}px"></div>`;
 }

 html+=`</div>`;
 chartBox.innerHTML=html;
}

function render(){
 list.innerHTML="";

 // 이번달 매출
 if(isAdmin){
  const ym=new Date().toISOString().slice(0,7);
  let total=0;
  let prev=0;

  sales.forEach(s=>{
    if(s.date.startsWith(ym)) total+=s.price;
  });

  const prevMonth = new Date();
  prevMonth.setMonth(prevMonth.getMonth()-1);
  const pm=prevMonth.toISOString().slice(0,7);

  sales.forEach(s=>{
    if(s.date.startsWith(pm)) prev+=s.price;
  });

  let diff=total-prev;
  dashboard.innerHTML=`📊 이번달: ${total.toLocaleString()}원 (${diff>=0?"+":""}${diff.toLocaleString()})`;
 }

 const sorted=[...students].sort((a,b)=>a.name.localeCompare(b.name,'ko'));

 sorted.forEach(s=>{
  const i=students.findIndex(x=>x.name===s.name);
  const d=getDaysLeft(s);

  let btn="";

  if(isAdmin){
    if(s.count<=0 && !s.notified.zero){
      const msg=`<유월화실> ${s.name}님, 수업횟수가 모두 소진되었습니다. 빠른 시일내에 다시 뵙길 바래요😔`;
      btn=`<button class="smsFlash" onclick='sendSMS(${i},"zero",\`${msg}\`)'>문자</button>`;
    }
    else if(d<=15 && !s.notified["15"]){
      const msg=`안녕하세요 ${s.name}님 수업횟수 ${s.count}회, 15일 남았습니다`;
      btn=`<button class="smsFlash" onclick='sendSMS(${i},"15",\`${msg}\`)'>문자</button>`;
    }
  }

  list.innerHTML+=`
  <div class="student">
    <div class="left" onclick="showDetail('${s.name}')">
      <b>${s.name}</b>
      <span>${s.count}회</span>
      <span>${d}일</span>
      ${s.memo?`<span class="memo">📝 ${s.memo}</span>`:""}
    </div>
    <div>
      <button onclick="attend(${i})">출석</button>
      ${btn}
      ${isAdmin?`<button onclick="resetStudent(${i})">결제</button>`:""}
    </div>
  </div>`;
 });
}

function showDetail(name){
 if(!isAdmin) return;
 const s=students.find(x=>x.name===name);

 modalBox.innerHTML=`
  ${name}<br>
  <input id="p" value="${s.phone}"><br>
  <input id="c" value="${s.count}"><br>
  <input id="pe" value="${s.period}"><br>
  <input id="pr" value="${s.price}"><br>
  <textarea id="m">${s.memo||""}</textarea><br>
  <button onclick="saveEdit('${name}')">저장</button>
 `;

 modal.style.display="flex";
}

function saveEdit(name){
 const s=students.find(x=>x.name===name);
 s.phone=p.value;
 s.count=+c.value;
 s.period=+pe.value;
 s.price=+pr.value;
 s.memo=m.value;
 save();
 modal.style.display="none";
}

function closeModal(e){
 if(e.target.id==="modal") modal.style.display="none";
}
</script>
</body>
</html>
