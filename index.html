<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Your art studio</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<style>
body{
  font-family:sans-serif;
  background:#9fbfaf;
  zoom:2;
}
h1{text-align:center;}

.card{
  background:#fff;
  margin:10px;
  padding:15px;
  border-radius:12px;
  display:flex;
  align-items:center;
}

.name{font-weight:bold;cursor:pointer;}
.info{margin-left:10px;}
.right{margin-left:auto;}

#adminBtn{
  position:fixed;
  bottom:20px;
  right:20px;
}

#adminPanel{
  display:none;
  background:#fff;
  padding:10px;
  margin:10px;
  border-radius:10px;
}

#modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
}

#modalContent{
  background:#fff;
  width:420px;
  margin:50px auto;
  padding:20px;
  border-radius:12px;
}

input,textarea{width:100%;margin-bottom:10px;}
.smsBtn{background:#ff8f8f;color:#fff;border:none;border-radius:8px;}
</style>
</head>

<body>

<h1>Your art studio</h1>

<div id="adminPanel">

  <h3>이번달 매출: <span id="monthTotal">0</span>원</h3>

  이름 <input id="name">
  횟수 <input id="count" type="number">
  기간 <input id="days" type="number" value="30">
  전화번호 <input id="phone">
  <button onclick="addStudent()">학생추가</button>

</div>

<div id="list"></div>

<button id="adminBtn" onclick="adminLogin()">관리자</button>

<!-- 모달 -->
<div id="modal">
<div id="modalContent">

<h3>학생 관리</h3>

이름 <input id="m_name">
전화번호 <input id="m_phone">
남은횟수 <input id="m_count" type="number">
금액 <input id="m_price" type="number">
메모 <textarea id="m_memo"></textarea>

<h4>💰 결제 추가</h4>
<input id="payInput" type="number">
<button onclick="addPayment()">추가</button>

<h4>결제 로그</h4>
<div id="m_pay"></div>

<h4>출석 로그</h4>
<div id="m_logs"></div>

<button onclick="saveStudent()">저장</button>
<button onclick="deleteStudent()">삭제</button>
<button onclick="closeModal()">닫기</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAOAYSvUXY5PNDfAgxBq0OVKAbkY0Tp7IM",
  databaseURL: "https://student-attendence-e9f58-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let data={}, currentId=null, isAdmin=false;

const ding = new Audio("https://key28me-maker.github.io/student-attendence/dingdong.mp3");

// 관리자
window.adminLogin=function(){
  const pw=prompt("비밀번호");
  if(pw==="0000"){
    isAdmin=true;
    adminPanel.style.display="block";
    document.body.style.background="#dceeff";
    render();
  }
}

// 학생 추가
window.addStudent=function(){
  const newRef=push(ref(db,"students"));

  set(newRef,{
    name:name.value,
    count:Number(count.value),
    days:Number(days.value)||30,
    phone:phone.value,
    start:Date.now(),
    memo:"",
    price:0,
    logs:{},
    payments:{}
  });
}

// 출석
window.attend=function(id){
  const s=data[id];
  if(s.count<=0) return;

  ding.currentTime=0;
  ding.play();

  const today=new Date().toISOString().slice(0,10);

  update(ref(db,"students/"+id),{
    count:s.count-1,
    ["logs/"+today]:true
  });
}

// 문자
window.sendSMS=function(s){
  const remain=Math.ceil((s.start+s.days*86400000-Date.now())/86400000);
  const msg=`안녕하세요 유월화실입니다:) ${s.name}님 수강권이 ${remain}일, ${s.count}회 남았습니다.`;
  location.href=`sms:${s.phone}?body=${encodeURIComponent(msg)}`;
}

// 모달
window.openModal=function(id){
  if(!isAdmin) return;

  currentId=id;
  const s=data[id];

  m_name.value=s.name||"";
  m_phone.value=s.phone||"";
  m_count.value=s.count||0;
  m_price.value=s.price||0;
  m_memo.value=s.memo||"";

  renderLogs(s);
  renderPayments(s);

  modal.style.display="block";
}

window.saveStudent=function(){
  update(ref(db,"students/"+currentId),{
    name:m_name.value,
    phone:m_phone.value,
    count:Number(m_count.value),
    price:Number(m_price.value),
    memo:m_memo.value
  });
  closeModal();
}

window.deleteStudent=function(){
  if(confirm("삭제?")){
    remove(ref(db,"students/"+currentId));
    closeModal();
  }
}

window.addPayment=function(){
  const amount=Number(payInput.value);
  if(!amount) return;

  const key=push(ref(db,"students/"+currentId+"/payments")).key;

  update(ref(db,"students/"+currentId+"/payments/"+key),{
    amount,
    date:Date.now()
  });

  payInput.value="";
}

window.delPay=function(k){
  remove(ref(db,"students/"+currentId+"/payments/"+k));
}

function renderPayments(s){
  m_pay.innerHTML="";
  if(s.payments){
    Object.entries(s.payments).forEach(([k,p])=>{
      m_pay.innerHTML+=`
        ${new Date(p.date).toLocaleDateString()} ${p.amount}원
        <button onclick="delPay('${k}')">❌</button><br>
      `;
    });
  }
}

function renderLogs(s){
  m_logs.innerHTML="";
  if(s.logs){
    Object.keys(s.logs).forEach(d=>{
      m_logs.innerHTML+=d+"<br>";
    });
  }
}

// 🔥 월매출 계산
function calcMonthTotal(){
  let total=0;
  const now=new Date();

  Object.values(data).forEach(s=>{
    if(s.payments){
      Object.values(s.payments).forEach(p=>{
        const d=new Date(p.date);
        if(d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear()){
          total+=p.amount;
        }
      });
    }
  });

  if(isAdmin){
    document.getElementById("monthTotal").innerText=total;
  }
}

// 화면
function render(){
  list.innerHTML="";

  Object.entries(data).forEach(([id,s])=>{

    let remain="-";
    if(s.start && s.days){
      remain=Math.ceil((s.start+s.days*86400000-Date.now())/86400000);
    }

    let smsBtn="";
    if(isAdmin && remain<=15){
      smsBtn=`<button class="smsBtn" onclick='sendSMS(${JSON.stringify(s)})'>문자</button>`;
    }

    list.innerHTML+=`
      <div class="card">
        <div class="name" onclick="openModal('${id}')">${s.name}</div>
        <div class="info">(${s.count}회 / ${remain}일)</div>

        <div class="right">
          <button onclick="attend('${id}')">출석</button>
          ${smsBtn}
          ${isAdmin ? `<button onclick="deleteStudentConfirm('${id}')">삭제</button>` : ""}
        </div>
      </div>
    `;
  });

  calcMonthTotal(); // 🔥 여기 핵심
}

// 카드 삭제
window.deleteStudentConfirm=function(id){
  if(confirm("삭제?")){
    remove(ref(db,"students/"+id));
  }
}

// 데이터
onValue(ref(db,"students"),snap=>{
  data=snap.val()||{};
  render();
});

</script>

</body>
</html>
