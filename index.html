<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>출석 체크</title>

<style>
body { font-family:sans-serif; background:#c1e5d2; padding:20px; font-size:20px;}
.top { display:flex; gap:10px; margin-bottom:10px;}
input { flex:1; padding:14px; font-size:20px;}
button { padding:14px; border:none; border-radius:10px; background:#f3a4b0; color:white; font-size:20px;}
.attendBtn { padding:22px 28px; font-size:26px;}
.adminBtn { position:fixed; bottom:10px; right:10px; background:#333;}
.student { background:white; padding:18px; margin-bottom:10px; border-radius:12px; display:flex; justify-content:space-between;}
.nameBox { display:flex; flex-direction:column;}
.count { font-size:16px; color:#666;}
.delete { background:red;}
.smsFlash { animation: glow 1s infinite; background:#ff6b6b !important;}
@keyframes glow {0%{box-shadow:0 0 0}50%{box-shadow:0 0 25px #fff}100%{box-shadow:0 0 0}}
</style>
</head>

<body>

<h1>출석 체크</h1>

<div id="smsBox" style="display:none; background:#fff3cd; padding:15px; border-radius:12px; margin-bottom:15px;"></div>

<div class="top">
<input id="search" placeholder="이름 검색" oninput="render()">
</div>

<div class="top" id="adminPanel" style="display:none;">
<input id="nameInput" placeholder="학생 이름">
<input id="phoneInput" placeholder="전화번호">
<input id="periodInput" placeholder="이용기간(일)">
<button onclick="addStudent()">추가</button>
</div>

<div id="list"></div>
<button class="adminBtn" onclick="toggleAdmin()">관리자</button>

<audio id="dingSound" src="dingdong.mp3"></audio>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey:"AIzaSy...",
  authDomain:"...",
  databaseURL:"...",
  projectId:"..."
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let students=[], history={}, isAdmin=false;
const sound=document.getElementById("dingSound");

function today(){ return new Date().toISOString().split("T")[0]; }

db.ref("data").on("value",(snap)=>{
 const val=snap.val();
 if(val){
  students=val.students||[];
  history=val.history||{};
 }
 render();
});

function save(){ db.ref("data").set({students,history}); }

function toggleAdmin(){
 const pw=prompt("비밀번호");
 if(pw==="1234"){
  isAdmin=!isAdmin;
  document.getElementById("adminPanel").style.display=isAdmin?"flex":"none";
  render();
 }
}

function addStudent(){
 const name=document.getElementById("nameInput").value.trim();
 const phone=document.getElementById("phoneInput").value.trim();
 const period=Number(document.getElementById("periodInput").value);

 if(!name || !phone || !period) return;

 students.push({
  name, phone,
  count:4,
  startDate: today(),
  period,
  notified:{}
 });

 save();
}

function getDaysLeft(s){
 const start=new Date(s.startDate);
 const expire=new Date(start);
 expire.setDate(expire.getDate()+s.period);

 return Math.ceil((expire-new Date())/(1000*60*60*24));
}

// 🔥 하루 여러번 출석 가능
function attend(i){
 if(!confirm("출석하시려면 확인")) return;

 const date=today();
 if(!history[date]) history[date]=[];

 history[date].push({name:students[i].name, time:new Date().toISOString()});
 students[i].count--;

 sound.currentTime=0;
 sound.play().catch(()=>{});

 save();
}

// 문자 발송
function sendSMS(s,msg){
 location.href=`sms:${s.phone}?body=${encodeURIComponent(msg)}`;

 // 🔥 오늘 보낸 기록 저장
 if(!s.notified[today()]) s.notified[today()]=true;
 save();
}

function resetStudent(i){
 students[i].count=4;
 students[i].startDate=today();
 students[i].notified={};
 save();
}

function render(){
 const list=document.getElementById("list");
 list.innerHTML="";
 const q=document.getElementById("search").value.toLowerCase();

 let smsList=[];

 students
 .filter(s=>s.name.toLowerCase().includes(q))
 .sort((a,b)=>a.name.localeCompare(b.name,'ko'))
 .forEach((s,i)=>{

  const idx=students.indexOf(s);
  const div=document.createElement("div");
  div.className="student";

  const daysLeft=getDaysLeft(s);
  let smsBtn="";

  const alreadySent = s.notified[today()];

  // 🔥 조건 + 중복 방지 + 오늘 숨김
  if(!alreadySent){

    if(s.count===3 && daysLeft<=Math.ceil(s.period*0.3)){
      const msg=`${s.name}님, 안녕하세요 🙂
현재 수업 이용기간이 ${daysLeft}일 남았습니다.
남은 횟수는 ${s.count}회입니다.`;

      if(isAdmin){
        smsBtn=`<button class="smsFlash" onclick='sendSMS(${JSON.stringify(s)}, \`${msg}\`)'>문자</button>`;
        smsList.push({s,msg});
      }
    }

    if(s.count===2 && daysLeft<=Math.ceil(s.period*0.15)){
      const msg=`${s.name}님, 수업 이용기간이 얼마 남지 않았습니다.
현재 ${daysLeft}일 / ${s.count}회 남아있습니다.`;

      if(isAdmin){
        smsBtn=`<button class="smsFlash" onclick='sendSMS(${JSON.stringify(s)}, \`${msg}\`)'>문자</button>`;
        smsList.push({s,msg});
      }
    }

    if(daysLeft<=3){
      const msg=`${s.name}님, 수업 이용기간이 곧 종료됩니다.
${daysLeft}일 남았으며 ${s.count}회 남아있습니다.`;

      if(isAdmin){
        smsBtn=`<button class="smsFlash" onclick='sendSMS(${JSON.stringify(s)}, \`${msg}\`)'>문자</button>`;
        smsList.push({s,msg});
      }
    }

  }

  if(daysLeft<=3){
    div.style.background="#ffe5e5";
  }

  div.innerHTML=`
  <div class="nameBox">
    <div>${s.name}</div>
    <div class="count">남은횟수: ${s.count} / ${daysLeft}일 남음</div>
  </div>
  <div>
    <button class="attendBtn" onclick="attend(${idx})">출석</button>
    ${smsBtn}
    ${isAdmin?`
      <button onclick="resetStudent(${idx})">재등록</button>
      <button class="delete" onclick="deleteStudent(${idx})">삭제</button>
    `:""}
  </div>`;

  list.appendChild(div);
 });

 // 🔥 상단 문자 리스트
 const box=document.getElementById("smsBox");

 if(isAdmin && smsList.length>0){
  box.style.display="block";
  box.innerHTML="<b>📩 오늘 문자 대상</b><br><br>";

  smsList.forEach(obj=>{
    box.innerHTML+=`
      <div style="margin-bottom:8px;">
        ${obj.s.name}
        <button onclick='sendSMS(${JSON.stringify(obj.s)}, \`${obj.msg}\`)'>보내기</button>
      </div>`;
  });

 }else{
  box.style.display="none";
 }
}

function deleteStudent(i){
 if(!confirm("삭제?")) return;
 students.splice(i,1);
 save();
}
</script>
</body>
</html>
