<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>출석 체크</title>

<style>
body {
  font-family: sans-serif;
  background:#c1e5d2;
  padding:20px;
  font-size:20px;
}

h1 { text-align:center; }

.top {
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

input {
  flex:1;
  padding:14px;
  font-size:20px;
}

button {
  padding:14px;
  border:none;
  border-radius:10px;
  background:#f3a4b0;
  color:white;
  font-size:20px;
}

.attendBtn {
  padding:22px 28px;
  font-size:26px;
}

.adminBtn {
  position:fixed;
  bottom:10px;
  right:10px;
  background:#333;
}

.student {
  background:white;
  padding:18px;
  margin-bottom:10px;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.nameBox {
  display:flex;
  flex-direction:column;
}

.count {
  font-size:16px;
  color:#666;
}

.delete { background:red; }

/* 반짝 */
@keyframes glow {
  0% { box-shadow:0 0 0px #fff; }
  50% { box-shadow:0 0 25px #fff; }
  100% { box-shadow:0 0 0px #fff; }
}
.flash { animation: glow 1s infinite; }

</style>
</head>

<body>

<h1>출석 체크</h1>

<div class="top">
  <input id="search" placeholder="이름 검색" oninput="render()">
</div>

<!-- 관리자 -->
<div class="top" id="adminPanel" style="display:none;">
  <input id="nameInput" placeholder="학생 이름">
  <button onclick="addStudent()">추가</button>
  <button onclick="showToday()">오늘출석</button>
</div>

<div id="list"></div>

<button class="adminBtn" onclick="toggleAdmin()">관리자</button>

<audio id="dingSound" src="dingdong.mp3" preload="auto"></audio>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAOAYSvUXY5PNDfAgxBq0OVKAbkY0Tp7IM",
  authDomain: "student-attendence-e9f58.firebaseapp.com",
  databaseURL: "https://student-attendence-e9f58-default-rtdb.firebaseio.com",
  projectId: "student-attendence-e9f58"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let students = [];
let history = {};
let isAdmin = false;
let lastClicked = null;

const sound = document.getElementById("dingSound");

function today(){
  return new Date().toISOString().split("T")[0];
}

// Firebase
db.ref("data").on("value", (snap) => {
  const val = snap.val();
  if (val) {
    students = val.students || [];
    history = val.history || {};
  }
  render();
});

function save(){
  db.ref("data").set({ students, history });
}

function toggleAdmin(){
  const pw = prompt("비밀번호");
  if(pw==="1234"){
    isAdmin = !isAdmin;
    document.getElementById("adminPanel").style.display = isAdmin?"flex":"none";
    render();
  }
}

function addStudent(){
  const name = document.getElementById("nameInput").value.trim();
  if(!name) return;
  students.push({name, count:10});
  save();
}

// 🔥 출석 (확인 추가)
function attend(i){
  const ok = confirm("출석하시려면 확인을 눌러주세요.");
  if(!ok) return;

  if(students[i].count<=0) return alert("횟수 없음");

  const date = today();
  if(!history[date]) history[date]=[];

  history[date].push({name:students[i].name});
  students[i].count--;

  sound.currentTime = 0;
  sound.play().catch(()=>{});

  lastClicked = students[i].name;

  save();

  setTimeout(()=>{
    lastClicked = null;
    render();
  },3000);
}

// 🔥 오늘 출석자 보기
function showToday(){
  const list = history[today()] || [];
  if(list.length===0){
    alert("오늘 출석 없음");
    return;
  }

  const names = list.map(v=>v.name).join("\n");
  alert("오늘 출석:\n\n" + names);
}

function deleteStudent(i){
  if(!confirm("삭제?")) return;
  students.splice(i,1);
  save();
}

function changeCount(i){
  const v = prompt("새 횟수", students[i].count);
  if(v===null) return;
  const num = Number(v);
  if(isNaN(num)) return alert("숫자 입력");
  students[i].count = num;
  save();
}

function render(){
  const list = document.getElementById("list");
  list.innerHTML="";

  const q = document.getElementById("search").value.toLowerCase();

  students
    .filter(s=>s.name.toLowerCase().includes(q))
    .sort((a,b)=>a.name.localeCompare(b.name,'ko'))
    .forEach((s,i)=>{
      const realIndex = students.indexOf(s);

      const div = document.createElement("div");
      div.className="student";

      if(s.name===lastClicked) div.classList.add("flash");

      div.innerHTML=`
        <div class="nameBox">
          <div>${s.name}</div>
          <div class="count">남은횟수: ${s.count}</div>
        </div>
        <div>
          <button class="attendBtn" onclick="attend(${realIndex})">출석</button>
          ${isAdmin?`
            <button onclick="changeCount(${realIndex})">수정</button>
            <button class="delete" onclick="deleteStudent(${realIndex})">삭제</button>
          `:""}
        </div>
      `;

      list.appendChild(div);
    });
}

</script>

</body>
</html>
