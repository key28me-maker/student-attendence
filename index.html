<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Your art studio</title>
</head>
<body>

<h1>Your art studio</h1>

<input id="name" placeholder="이름">
<input id="count" placeholder="횟수">
<button onclick="addStudent()">추가</button>

<ul id="list"></ul>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
  import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAOAYSvUXY5PNDfAgxBq0OVKAbkY0Tp7IM",
    authDomain: "student-attendence-e9f58.firebaseapp.com",
    databaseURL: "https://student-attendence-e9f58-default-rtdb.firebaseio.com",
    projectId: "student-attendence-e9f58"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  window.addStudent = function () {
    const name = document.getElementById("name").value;
    const count = document.getElementById("count").value;

    push(ref(db, "students"), {
      name: name,
      count: Number(count)
    });
  };

  const list = document.getElementById("list");

  onValue(ref(db, "students"), (snapshot) => {
    list.innerHTML = "";
    const data = snapshot.val();

    for (let key in data) {
      const li = document.createElement("li");
      li.innerText = data[key].name + " (" + data[key].count + "회)";
      list.appendChild(li);
    }
  });

</script>

</body>
</html>
