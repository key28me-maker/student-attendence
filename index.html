<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Your art studio</title>

<style>
body{
  background:#a8c5b5;
  font-family:sans-serif;
  padding:20px;
}

h1{
  text-align:center;
}

.inputWrap{
  display:none; /* 기본 숨김 */
  gap:10px;
  margin-bottom:20px;
}

input{
  padding:10px;
  font-size:16px;
  flex:1;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:#ff8f8f;
  color:white;
  cursor:pointer;
}

.card{
  background:white;
  padding:15px;
  border-radius:15px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.btns button{
  margin-left:5px;
}

.adminBtn{
  position:fixed;
  right:20px;
  bottom:20px;
  background:#333;
}
</style>

</head>

<body>

<h1>Your art studio</h1>

<div class="inputWrap" id="inputWrap">
  <input id="name" placeholder="학생 이름">
  <input id="count" placeholder="횟수">
  <button onclick="addStudent()">추가</button>
</div>

<div id="list"></div>

<button class="adminBtn" onclick="toggleAdmin()">관리자</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAOAYSvUXY5PNDfAgxBq0OVKAbkY0Tp7IM",
  authDomain: "student-attendence-e9f58.firebaseapp.com",
  databaseURL: "https://student-attendence-e9f58-default-rtdb.firebaseio.com",
  projectId: "student-attendence-e9f58"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let isAdmin = false;

window.toggleAdmin = function(){
  isAdmin = !isAdmin;

  // 👉 관리자일 때만 입력창 보이기
  document.getElementById("inputWrap").style.display = isAdmin ? "flex" : "none";

  render(currentData);
}

window.addStudent = function(){
  if(!isAdmin) return; // 관리자만 가능

  const name = document.getElementById("name").value;
  const count = Number(document.getElementById("count").value);

  if(!name) return;

  push(ref(db,"students"),{
    name,
    count,
    days:30,
    created:Date.now()
  });
}

window.attend = function(key, student){
  if(!confirm("출석하시겠습니까?")) return;

  const newCount = (student.count || 0) - 1;

  update(ref(db,"students/"+key),{
    count:newCount
  });

  const audio = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
  audio.play();
}

window.removeStudent = function(key){
  if(!isAdmin) return;

  if(confirm("삭제할거야?")){
    remove(ref(db,"students/"+key));
  }
}

window.sendSMS = function(student){
  if(!isAdmin) return;

  alert(`${student.name}님\n남은횟수 ${student.count}회\n사용기한 ${student.days||30}일`);
}

let currentData = {};

const list = document.getElementById("list");

function render(data){
  list.innerHTML = "";

  const arr = Object.entries(data || {}).sort((a,b)=>{
    return a[1].name.localeCompare(b[1].name,"ko");
  });

  arr.forEach(([key, s])=>{

    const div = document.createElement("div");
    div.className="card";

    div.innerHTML = `
      <div>
        <b>${s.name}</b>
        ${s.count || 0}회 / ${s.days || 30}일
      </div>

      <div class="btns">
        <button onclick='attend("${key}", ${JSON.stringify(s)})'>출석</button>
        ${isAdmin ? `<button onclick='sendSMS(${JSON.stringify(s)})'>문자</button>` : ``}
        ${isAdmin ? `<button onclick='removeStudent("${key}")'>삭제</button>` : ``}
      </div>
    `;

    list.appendChild(div);
  });
}

onValue(ref(db,"students"),(snapshot)=>{
  currentData = snapshot.val() || {};
  render(currentData);
});

</script>

</body>
</html>
