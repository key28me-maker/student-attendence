<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your art studio</title>

<style>
body { font-family:sans-serif; background:#c1e5d2; padding:30px; font-size:1.5em;}
h1 { text-align:center; }

.top { display:flex; gap:15px; margin-bottom:15px;}
input { flex:1; padding:18px;}
button { padding:15px 20px; border:none; border-radius:10px; background:#f3a4b0; color:white;}
.student { background:white; padding:25px; margin-bottom:15px; border-radius:15px; display:flex; justify-content:space-between; align-items:center;}
.left { display:flex; gap:20px; align-items:center;}
.adminBtn { position:fixed; bottom:20px; right:20px; background:#333;}

.smsFlash { animation: glow 1s infinite; background:#ff6b6b;}
@keyframes glow {
  0%{box-shadow:0 0 0}
  50%{box-shadow:0 0 20px #fff}
  100%{box-shadow:0 0 0}
}

.modal {
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  display:none;justify-content:center;align-items:center;
}
.box {
  background:white;padding:30px;border-radius:15px;
  width:90%;max-width:500px;
}
</style>
</head>

<body>

<h1>Your art studio</h1>

<audio id="dingSound" src="dingdong.mp3"></audio>

<div class="top" id="adminPanel" style="display:none;">
<input id="nameInput" placeholder="학생 이름">
<input id="phoneInput" placeholder="전화번호">
<input id="periodInput" placeholder="기간(일)">
<input id="priceInput" placeholder="수강료">
<button onclick="addStudent()">추가</button>
</div>

<div id="list"></div>
<button class="adminBtn" onclick="toggleAdmin()">관리자</button>

<div class="modal" id="modal" onclick="closeModal(event)">
  <div class="box" id="modalBox"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey:"AIzaSyAOAYSvUXY5PNDfAgxBq0OVKAbkY0Tp7IM",
  authDomain:"student-attendence-e9f58.firebaseapp.com",
  databaseURL:"https://student-attendence-e9f58-default-rtdb.firebaseio.com",
  projectId:"student-attendence-e9f58"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let students=[], history={}, sales=[], isAdmin=false;

function today(){return new Date().toISOString().split("T")[0];}

// 데이터 불러오기
db.ref("data").on("value",snap=>{
 const v=snap.val();
 if(v){
  students=v.students||[];
  history=v.history||{};
  sales=v.sales||[];
 }
 render();
});

// 🔥 안전 저장
function save(){
 db.ref("data").update({
  students: students || [],
  history: history || {},
  sales: sales || []
 });
}

function toggleAdmin(){
 if(prompt("비밀번호")==="1234"){
  isAdmin=!isAdmin;
  document.getElementById("adminPanel").style.display=isAdmin?"flex":"none";
  render();
 }
}

function addStudent(){
 const name=nameInput.value.trim();
 const phone=phoneInput.value.trim();
 const period=+periodInput.value;
 const price=+priceInput.value;

 if(!name||!phone||!period||!price) return alert("입력 부족");

 students.push({
  name, phone,
  period, price,
  count:4,
  startDate:today(),
  notified:{}
 });

 save();
}

function getDaysLeft(s){
 let d=new Date(s.startDate);
 d.setDate(d.getDate()+s.period);
 return Math.ceil((d-new Date())/(1000*60*60*24));
}

// 출석
function attend(i){
 if(!confirm("출석하시겠습니까?")) return;

 history[today()] = history[today()] || [];
 history[today()].push({name:students[i].name});

 students[i].count--;

 const sound=document.getElementById("dingSound");
 sound.currentTime=0;
 sound.play().catch(()=>{});

 save();
}

// 문자
function sendSMS(i,step,msg){
 const s = students[i];
 location.href=`sms:${s.phone}?body=${encodeURIComponent(msg)}`;
 s.notified[step]=true;
 save();
}

// 결제
function resetStudent(i){
 const s=students[i];
 sales.push({name:s.name,price:s.price,date:today()});
 s.count=4;
 s.startDate=today();
 s.notified={};
 save();
}

// 삭제
function deleteStudent(name){
 if(!confirm(name+" 삭제할까?")) return;
 students = students.filter(s=>s.name!==name);
 save();
}

// 상세 수정
function showStudentDetail(name){
 if(!isAdmin) return;

 const s = students.find(x=>x.name===name);

 modalBox.innerHTML=`
  <h3>${name}</h3>

  전화번호<br>
  <input id="editPhone" value="${s.phone}"><br><br>

  남은 횟수<br>
  <input id="editCount" value="${s.count}"><br><br>

  남은 기간(일)<br>
  <input id="editPeriod" value="${s.period}"><br><br>

  수강료<br>
  <input id="editPrice" value="${s.price}"><br><br>

  <button onclick="saveEdit('${name}')">저장</button>
  <button onclick="deleteStudent('${name}')">삭제</button>
 `;

 modal.style.display="flex";
}

function saveEdit(name){
 const s = students.find(x=>x.name===name);

 s.phone = document.getElementById("editPhone").value;
 s.count = Number(document.getElementById("editCount").value);
 s.period = Number(document.getElementById("editPeriod").value);
 s.price = Number(document.getElementById("editPrice").value);

 save();
 modal.style.display="none";
 render();
}

function closeModal(e){
 if(e.target.id==="modal") modal.style.display="none";
}

// 렌더링
function render(){
 const list=document.getElementById("list");
 list.innerHTML="";

 const sorted=[...students].sort((a,b)=>a.name.localeCompare(b.name,'ko'));

 sorted.forEach((s)=>{
  // 🔥 핵심 수정 (index 안정화)
  const i = students.findIndex(x => x.name === s.name);

  const d=getDaysLeft(s);
  let btn="";

  if(isAdmin){
    if(d<=15 && !s.notified?.["15"]){
      btn=`<button class="smsFlash" onclick='sendSMS(${i},"15","안녕하세요 ${s.name}님 우리 화실의 수업횟수가 ${s.count}회, 사용기한이 15일 남았습니다. 😀 편한 시간에 예약 주시면 감사하겠습니다. ")'>문자</button>`;
    }
    else if(d<=7 && !s.notified?.["7"]){
      btn=`<button class="smsFlash" onclick='sendSMS(${i},"7","안녕하세요 ${s.name}님 우리 화실의 수업횟수가 ${s.count}회, 사용기한이 7일 남았습니다. 😀 편한 시간에 예약 주시면 감사하겠습니다. ")'>문자</button>`;
    }
    else if(d<=3 && !s.notified?.["3"]){
      btn=`<button class="smsFlash" onclick='sendSMS(${i},"3","안녕하세요 ${s.name}님 우리 화실의 수업횟수가 ${s.count}회, 사용기한이 3일 남았습니다. 😀 빠른 시일내 방문 주세요!")'>문자</button>`;
    }
  }

  list.innerHTML+=`
  <div class="student">
    <div class="left" onclick="showStudentDetail('${s.name}')">
      <b>${s.name}</b>
      <span>${s.count}회</span>
      <span>${d}일</span>
    </div>
    <div>
      <button onclick="attend(${i})">출석</button>
      ${btn}
      ${isAdmin?`<button onclick="resetStudent(${i})">결제</button>`:""}
    </div>
  </div>`;
 });
}
</script>
</body>
</html>
