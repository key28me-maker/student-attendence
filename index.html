<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>출석 체크</title>

<style>
body {
  font-family: sans-serif;
  background:#c1e5d2;
  padding:20px;
  font-size:20px;
}

h1 { text-align:center; }

.top {
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

input {
  flex:1;
  padding:14px;
  font-size:20px;
}

button {
  padding:14px;
  border:none;
  border-radius:10px;
  background:#f3a4b0;
  color:white;
  font-size:20px;
}

.adminBtn {
  position:fixed;
  bottom:10px;
  right:10px;
  background:#333;
}

.student {
  background:white;
  padding:18px;
  margin-bottom:10px;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition:0.3s;
}

.delete { background:red; }

/* ✨ 반짝 애니메이션 */
@keyframes glow {
  0% { box-shadow: 0 0 0px #fff; }
  50% { box-shadow: 0 0 25px #ffffff, 0 0 40px #ffffff; }
  100% { box-shadow: 0 0 0px #fff; }
}

.flash {
  animation: glow 1s ease-in-out infinite;
}

/* 달력 */
.calendarModal {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.calendarBox {
  background:white;
  padding:20px;
  border-radius:15px;
  width:90%;
  max-width:500px;
}

.calendarHeader {
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.calendar {
  display:grid;
  grid-template-columns: repeat(7,1fr);
  gap:8px;
}

.day {
  padding:10px;
  text-align:center;
  background:#eee;
  border-radius:8px;
}

.active { background:#4caf50; color:white; }
.today { border:3px solid #5f9578; }
.sunday { color:#e881c6; }
.saturday { color:#82d3e8; }
</style>
</head>

<body>

<h1>출석 체크</h1>

<div class="top">
  <input id="search" placeholder="이름 검색" oninput="render()">
</div>

<div class="top" id="adminPanel" style="display:none;">
  <input id="nameInput" placeholder="학생 이름">
  <button onclick="addStudent()">추가</button>
</div>

<div id="list"></div>

<button class="adminBtn" onclick="toggleAdmin()">관리자</button>

<!-- 달력 -->
<div class="calendarModal" id="calendarModal" onclick="closeCalendar(event)">
  <div class="calendarBox">
    <div class="calendarHeader">
      <button onclick="prevMonth()">◀</button>
      <div id="monthTitle"></div>
      <button onclick="nextMonth()">▶</button>
    </div>
    <div class="calendar" id="calendar"></div>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAOAYSvUXY5PNDfAgxBq0OVKAbkY0Tp7IM",
  authDomain: "student-attendence-e9f58.firebaseapp.com",
  databaseURL: "https://student-attendence-e9f58-default-rtdb.firebaseio.com",
  projectId: "student-attendence-e9f58"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let students = [];
let history = {};
let isAdmin = false;
let selectedStudent = null;
let currentDate = new Date();

// 🔊 소리
const sound = new Audio("https://actions.google.com/sounds/v1/alarms/doorbell.ogg");
sound.preload = "auto";

// 🔥 마지막 클릭된 학생 (애니메이션용)
let lastClicked = null;

// Firebase
db.ref("data").on("value", (snap) => {
  const val = snap.val();
  if (val) {
    students = val.students || [];
    history = val.history || {};
  }
  render();
});

function save(){
  db.ref("data").set({ students, history });
}

function toggleAdmin(){
  const pw = prompt("비밀번호");
  if(pw==="1234"){
    isAdmin = !isAdmin;
    document.getElementById("adminPanel").style.display = isAdmin?"flex":"none";
    render();
  }
}

function addStudent(){
  const name = document.getElementById("nameInput").value.trim();
  if(!name) return;
  students.push({name, count:10});
  save();
}

function attend(i){
  if(students[i].count<=0) return alert("횟수 없음");

  const date = new Date().toISOString().split("T")[0];
  if(!history[date]) history[date]=[];

  history[date].push({name:students[i].name});
  students[i].count--;

  // 🔊 소리
  sound.currentTime = 0;
  sound.play().catch(()=>{});

  // ✨ 애니메이션 대상 저장
  lastClicked = students[i].name;

  save();

  // 3초 후 애니메이션 제거
  setTimeout(()=>{
    lastClicked = null;
    render();
  }, 3000);
}

function deleteStudent(i){
  if(!confirm("삭제?")) return;
  students.splice(i,1);
  save();
}

function changeCount(i){
  const v = prompt("새 횟수", students[i].count);
  if(v===null) return;
  const num = Number(v);
  if(isNaN(num)) return alert("숫자 입력");
  students[i].count = num;
  save();
}

function render(){
  const list = document.getElementById("list");
  list.innerHTML="";

  const q = document.getElementById("search").value.toLowerCase();

  students.filter(s=>s.name.toLowerCase().includes(q))
  .forEach((s,i)=>{
    const realIndex = students.indexOf(s);

    const div = document.createElement("div");
    div.className="student";

    // ✨ 애니메이션 적용
    if(s.name === lastClicked){
      div.classList.add("flash");
    }

    div.innerHTML=`
      <div onclick="openCalendar('${s.name}')">
        ${s.name} (남은:${s.count})
      </div>
      <div>
        <button onclick="attend(${realIndex})">출석</button>
        ${isAdmin?`
          <button onclick="changeCount(${realIndex})">수정</button>
          <button class="delete" onclick="deleteStudent(${realIndex})">삭제</button>
        `:""}
      </div>
    `;

    list.appendChild(div);
  });
}

/* 달력 */
function openCalendar(name){
  selectedStudent=name;
  document.getElementById("calendarModal").style.display="flex";
  drawCalendar();
}

function closeCalendar(e){
  if(e.target.id==="calendarModal"){
    document.getElementById("calendarModal").style.display="none";
  }
}

function drawCalendar(){
  const cal = document.getElementById("calendar");
  cal.innerHTML="";

  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  const today = new Date().toISOString().split("T")[0];

  document.getElementById("monthTitle").innerText =
    year+"년 "+(month+1)+"월";

  const firstDay = new Date(year,month,1).getDay();
  const lastDay = new Date(year,month+1,0).getDate();

  const days=["일","월","화","수","목","금","토"];
  days.forEach((d,i)=>{
    const div=document.createElement("div");
    div.innerText=d;
    if(i===0) div.classList.add("sunday");
    if(i===6) div.classList.add("saturday");
    cal.appendChild(div);
  });

  for(let i=0;i<firstDay;i++){
    cal.appendChild(document.createElement("div"));
  }

  for(let i=1;i<=lastDay;i++){
    const date = year+"-"+String(month+1).padStart(2,"0")+"-"+String(i).padStart(2,"0");

    const div=document.createElement("div");
    div.className="day";
    div.innerText=i;

    const day=new Date(year,month,i).getDay();
    if(day===0) div.classList.add("sunday");
    if(day===6) div.classList.add("saturday");

    if(date===today) div.classList.add("today");

    if(history[date]){
      history[date].forEach(r=>{
        if(r.name===selectedStudent) div.classList.add("active");
      });
    }

    cal.appendChild(div);
  }
}

function prevMonth(){ currentDate.setMonth(currentDate.getMonth()-1); drawCalendar();}
function nextMonth(){ currentDate.setMonth(currentDate.getMonth()+1); drawCalendar();}

</script>

</body>
</html>
