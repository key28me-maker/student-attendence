<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Your art studio</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<style>
body{
  font-family:sans-serif;
  background:#9fbfaf;
  zoom:2;
}
h1{text-align:center;}

.card{
  background:#fff;
  margin:10px;
  padding:15px;
  border-radius:12px;
  display:flex;
  align-items:center;
}

.name{
  font-weight:bold;
  cursor:pointer;
}

.info{margin-left:10px;}
.right{margin-left:auto;}

button{margin-left:5px;}

#adminBtn{
  position:fixed;
  bottom:20px;
  right:20px;
}

#admin{
  display:none;
  padding:15px;
}

.smsBtn{
  background:#ff8f8f;
  color:white;
  border:none;
  border-radius:8px;
  padding:5px 10px;
}
</style>
</head>

<body>

<h1>Your art studio</h1>

<div id="list"></div>

<button id="adminBtn" onclick="adminLogin()">관리자</button>

<div id="admin">
  이름 <input id="name">
  횟수 <input id="count" type="number">
  기간 <input id="days" type="number" value="30">
  전화번호 <input id="phone">
  <button onclick="addStudent()">추가</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAOAYSvUXY5PNDfAgxBq0OVKAbkY0Tp7IM",
  authDomain: "student-attendence-e9f58.firebaseapp.com",
  databaseURL: "https://student-attendence-e9f58-default-rtdb.firebaseio.com",
  projectId: "student-attendence-e9f58"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let isAdmin=false;
let data={};

const ding = new Audio("https://key28me-maker.github.io/student-attendence/dingdong.mp3");

// 관리자
window.adminLogin=function(){
  const pw=prompt("비밀번호");
  if(pw==="0000"){
    isAdmin=true;
    document.getElementById("admin").style.display="block";
    render();
  }
}

// 학생 추가
window.addStudent=function(){
  const newRef=push(ref(db,"students"));

  set(newRef,{
    name:name.value,
    count:Number(count.value),
    days:Number(days.value)||30,
    phone:phone.value,
    start:Date.now(),
    memo:"",
    price:0
  });
}

// 출석
window.attend=function(id){
  const s=data[id];
  if(s.count<=0) return;

  if(!confirm("출석하시겠습니까?")) return;

  ding.currentTime=0;
  ding.play();

  update(ref(db,"students/"+id),{
    count:s.count-1
  });
}

// 문자
window.sendSMS=function(s){
  const remainDays = Math.ceil((s.start + s.days*86400000 - Date.now())/86400000);
  const msg = `안녕하세요 유월화실입니다:) ${s.name}님 수강권이 ${remainDays}일, ${s.count}회 남았습니다.`;
  location.href = `sms:${s.phone}?body=${encodeURIComponent(msg)}`;
}

// 🔥 관리자 수정 팝업
window.editStudent=function(id){
  if(!isAdmin) return;

  const s=data[id];

  const memo = prompt("메모", s.memo||"");
  const count = prompt("남은 횟수", s.count);
  const price = prompt("금액", s.price||0);

  update(ref(db,"students/"+id),{
    memo:memo,
    count:Number(count),
    price:Number(price)
  });
}

// 화면
function render(){
  list.innerHTML="";

  Object.entries(data).forEach(([id,s])=>{

    let remainDays="-";
    if(s.start && s.days){
      remainDays=Math.ceil((s.start + s.days*86400000 - Date.now())/86400000);
    }

    let smsBtn="";
    if(isAdmin && remainDays<=15){
      smsBtn=`<button class="smsBtn" onclick='sendSMS(${JSON.stringify(s)})'>문자</button>`;
    }

    list.innerHTML+=`
      <div class="card">
        <div class="name" onclick="editStudent('${id}')">${s.name}</div>
        <div class="info">(${s.count}회 / ${remainDays}일)</div>

        <div class="right">
          <button onclick="attend('${id}')">출석</button>
          ${smsBtn}
        </div>
      </div>
    `;
  });
}

// 데이터
onValue(ref(db,"students"),snap=>{
  data=snap.val()||{};
  render();
});

</script>

</body>
</html>
